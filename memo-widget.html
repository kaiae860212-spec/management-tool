<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="memo-manifest.json">
<title>Quick Memo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111827;color:#e5e7eb;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-x:none}
header{display:flex;align-items:center;justify-content:space-between;background:#030712;padding:0 16px;height:44px;border-bottom:1px solid #1f2937;flex-shrink:0}
header h1{font-size:13px;font-weight:600;color:#f3f4f6}
.theme-btn{width:32px;height:32px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.theme-btn svg{width:14px;height:14px;stroke:#6b7280;fill:none;stroke-width:2}
.tabs{display:flex;gap:4px;padding:8px 12px;background:#030712;border-bottom:1px solid #1f2937;flex-shrink:0}
.tabs button{flex:1;padding:8px 0;font-size:10px;font-weight:600;border:1px solid #374151;border-radius:8px;background:none;color:#6b7280;cursor:pointer;transition:all 0.2s}
.tabs button.active{color:#60a5fa;border-color:#60a5fa;background:rgba(96,165,250,0.1)}
.content{flex:1;padding:8px 12px 12px;display:flex;flex-direction:column;overflow:hidden;will-change:transform,opacity;overscroll-behavior-x:none}
#editor{width:100%;flex:1;padding:12px;border:1px solid #374151;border-radius:10px;font-size:14px;background:#111827;color:#d1d5db;overflow-y:auto;outline:none;white-space:pre-wrap;word-break:break-word;touch-action:auto}
#editor:focus{border-color:#3b82f6}
#editor:empty::before{content:'Write here...';color:#4b5563;pointer-events:none}
.ql-panel{flex:1;display:flex;flex-direction:column;gap:8px}
.ql-panel input{width:100%;min-height:38px;padding:8px 12px;border:1px solid #374151;border-radius:8px;font-size:15px;font-weight:600;background:#111827;color:#f3f4f6;outline:none}
.ql-panel input:focus{border-color:#3b82f6}
.ql-panel .ql-body{flex:1;padding:12px;border:1px solid #374151;border-radius:10px;font-size:14px;background:#111827;color:#d1d5db;overflow-y:auto;outline:none;white-space:pre-wrap;word-break:break-word}
.ql-panel .ql-body:focus{border-color:#3b82f6}
.ql-panel .ql-body:empty::before{content:'Enter items (one per line)...';color:#4b5563;pointer-events:none}
.ql-markers{display:flex;gap:4px}
.ql-markers button{width:34px;height:34px;border:1px solid #374151;border-radius:8px;background:none;color:#e5e7eb;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ql-markers button.active{border-color:#60a5fa;background:rgba(96,165,250,0.1)}
.save-btn{width:100%;min-height:38px;border:none;border-radius:8px;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(to right,#374151,#1e3a5f,#374151);cursor:pointer}
.ql-label{color:#9ca3af}
.card-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.card{padding:12px;border:1px solid #374151;border-radius:10px;cursor:pointer;position:relative}
.card:active{background:rgba(55,65,81,0.5)}
.card .title{font-size:14px;font-weight:600;color:#f1f5f9;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .preview{font-size:12px;color:#6b7280;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;white-space:pre-wrap;line-height:1.4}
.card .del-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;border:none;background:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.card .del-btn svg{width:13px;height:13px;stroke:#6b7280;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.card .del-btn:active svg{stroke:#f87171}
.del-footer{width:100%;min-height:38px;border:1px solid #374151;border-radius:8px;background:none;color:#f87171;font-size:12px;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:4px}
.del-footer:active{background:rgba(248,113,113,0.1)}
.clear-btn{width:100%;min-height:34px;border:1px solid #374151;border-radius:8px;background:none;color:#6b7280;font-size:11px;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:4px}
.clear-btn:active{color:#f87171;border-color:#f87171}
.add-btn{width:100%;min-height:38px;border:1px dashed #374151;border-radius:8px;background:none;color:#6b7280;font-size:12px;cursor:pointer;margin-bottom:8px}
.back-btn{border:none;background:none;color:#60a5fa;font-size:13px;cursor:pointer;padding:4px 0;margin-bottom:8px;display:flex;align-items:center;gap:4px}
#detail-title{width:100%;min-height:40px;padding:8px 12px;border:1px solid #374151;border-radius:8px;font-size:16px;font-weight:600;background:#111827;color:#f3f4f6;outline:none;margin-bottom:8px}
#detail-title:focus{border-color:#3b82f6}
#detail-body{width:100%;flex:1;padding:12px;border:1px solid #374151;border-radius:10px;font-size:14px;background:#111827;color:#d1d5db;overflow-y:auto;outline:none;white-space:pre-wrap;word-break:break-word}
#detail-body:focus{border-color:#3b82f6}
#detail-body:empty::before{content:'Write details...';color:#4b5563;pointer-events:none}
body.light-mode{background:#f1f5f9;color:#0f172a}
body.light-mode header,body.light-mode .tabs{background:#fff;border-bottom-color:#cbd5e1}
body.light-mode header h1{color:#0f172a}
body.light-mode .theme-btn svg{stroke:#475569}

body.light-mode .tabs button.active{color:#2563eb;border-color:#2563eb;background:rgba(37,99,235,0.06)}
body.light-mode #editor,body.light-mode #detail-title,body.light-mode #detail-body,body.light-mode .ql-panel input,body.light-mode .ql-panel .ql-body{background:#fff;border-color:#cbd5e1;color:#0f172a}
body.light-mode #editor:empty::before,body.light-mode .ql-panel .ql-body:empty::before{color:#94a3b8}
body.light-mode .card{border-color:#cbd5e1}
body.light-mode .card .title{color:#0f172a}
body.light-mode .card .preview{color:#475569}
body.light-mode .add-btn{border-color:#cbd5e1;color:#475569}
body.light-mode .back-btn{color:#2563eb}
body.ivory-warm{background:#faf7f2;color:#3d3329}
body.ivory-warm header,body.ivory-warm .tabs{background:#f5f0e8;border-bottom-color:#e8dfd4}
body.ivory-warm header h1{color:#3d3329}
body.ivory-warm .theme-btn svg{stroke:#8b7355}
body.ivory-warm .tabs button{border-color:#e8dfd4;color:#8b7355}
body.ivory-warm .tabs button.active{color:#b8860b;border-color:#b8860b}
body.ivory-warm #editor,body.ivory-warm #detail-title,body.ivory-warm #detail-body,body.ivory-warm .ql-panel input,body.ivory-warm .ql-panel .ql-body{background:#fffef8;border-color:#e8dfd4;color:#3d3329}
body.ivory-warm #editor:empty::before,body.ivory-warm .ql-panel .ql-body:empty::before{color:#c4b59b}
body.ivory-warm .card{border-color:#e8dfd4}
body.ivory-warm .card .title{color:#3d3329}
body.ivory-warm .card .preview{color:#6b5b45}
body.ivory-warm .add-btn{border-color:#e8dfd4;color:#8b7355}
body.ivory-warm .back-btn{color:#b8860b}
body.ivory-cool{background:#f5f5f0;color:#2d3436}
body.ivory-cool header,body.ivory-cool .tabs{background:#eceee8;border-bottom-color:#d4d9cd}
body.ivory-cool header h1{color:#2d3436}
body.ivory-cool .theme-btn svg{stroke:#636e72}
body.ivory-cool .tabs button{border-color:#d4d9cd;color:#636e72}
body.ivory-cool .tabs button.active{color:#00897b;border-color:#00897b}
body.ivory-cool #editor,body.ivory-cool #detail-title,body.ivory-cool #detail-body,body.ivory-cool .ql-panel input,body.ivory-cool .ql-panel .ql-body{background:#fafcf7;border-color:#d4d9cd;color:#2d3436}
body.ivory-cool #editor:empty::before,body.ivory-cool .ql-panel .ql-body:empty::before{color:#a8b5a0}
body.ivory-cool .card{border-color:#d4d9cd}
body.ivory-cool .card .title{color:#2d3436}
body.ivory-cool .card .preview{color:#4a5568}
body.ivory-cool .add-btn{border-color:#d4d9cd;color:#636e72}
body.ivory-cool .back-btn{color:#00897b}
body.ivory-pink{background:#fdf2f4;color:#4a2030}
body.ivory-pink header,body.ivory-pink .tabs{background:#fae8ec;border-bottom-color:#f0ced6}
body.ivory-pink header h1{color:#4a2030}
body.ivory-pink .theme-btn svg{stroke:#9e4a6a}
body.ivory-pink .tabs button{border-color:#f0ced6;color:#9e4a6a}
body.ivory-pink .tabs button.active{color:#d63384;border-color:#d63384}
body.ivory-pink #editor,body.ivory-pink #detail-title,body.ivory-pink #detail-body,body.ivory-pink .ql-panel input,body.ivory-pink .ql-panel .ql-body{background:#fffafc;border-color:#f0ced6;color:#4a2030}
body.ivory-pink #editor:empty::before,body.ivory-pink .ql-panel .ql-body:empty::before{color:#dea0b5}
body.ivory-pink .card{border-color:#f0ced6}
body.ivory-pink .card .title{color:#4a2030}
body.ivory-pink .card .preview{color:#7a3a55}
body.ivory-pink .add-btn{border-color:#f0ced6;color:#9e4a6a}
body.ivory-pink .back-btn{color:#d63384}
body.ivory-blue{background:#f0f6fc;color:#1a365d}
body.ivory-blue header,body.ivory-blue .tabs{background:#e3eff8;border-bottom-color:#bed3e8}
body.ivory-blue header h1{color:#1a365d}
body.ivory-blue .theme-btn svg{stroke:#4a7ab5}
body.ivory-blue .tabs button{border-color:#bed3e8;color:#4a7ab5}
body.ivory-blue .tabs button.active{color:#1976d2;border-color:#1976d2}
body.ivory-blue #editor,body.ivory-blue #detail-title,body.ivory-blue #detail-body,body.ivory-blue .ql-panel input,body.ivory-blue .ql-panel .ql-body{background:#f8fbff;border-color:#bed3e8;color:#1a365d}
body.ivory-blue #editor:empty::before,body.ivory-blue .ql-panel .ql-body:empty::before{color:#90b8dc}
body.ivory-blue .card{border-color:#bed3e8}

body.light-mode .ql-markers button{border-color:#cbd5e1;color:#0f172a}

body.ivory-warm .ql-markers button.active{border-color:#b8860b}

</style>

<body>
<header>
  <h1>Quick Memo</h1>
  <div style="display:flex;gap:4px">
    <button class="theme-btn" onclick="cycleTheme()"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 0111.21 3 7 7 0 0012 21a7 7 0 009-8.21z"/></svg></button>
    <button class="theme-btn" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M4 4v5h5M20 20v-5h-5"/><path d="M20.49 9A9 9 0 005.64 5.64L4 4m16 16l-1.64-1.64A9 9 0 013.51 15"/></svg></button>
  </div>
</header>
<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>
<script>
const THEMES=['','light-mode','ivory-warm','ivory-cool','ivory-pink','ivory-blue'];
const LABELS=['List','Memo','Private','Work','People','Places'];
const CARD_KEYS={5:'tm-people',6:'tm-places'};
const MEMO_KEYS={2:'tm-memo-1',3:'tm-memo-2',4:'tm-memo-3'};
let tab=parseInt(localStorage.getItem('mw-tab'))||2;
let cardView=null;
let listMode='list'; // 'list' or 'create'
let editingListId=null;
let timer=null;
let qlMarker='bullet';
let qlTitle='';
let qlBody='';

function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(36).slice(2)}
function loadCards(key){try{return JSON.parse(localStorage.getItem(key)||'[]')}catch{return[]}}
function saveCards(key,items){localStorage.setItem(key,JSON.stringify(items))}
function loadLists(){try{return JSON.parse(localStorage.getItem('tm-lists')||'[]')}catch{return[]}}
function saveLists(items){localStorage.setItem('tm-lists',JSON.stringify(items))}

function init(){
  document.body.className=localStorage.getItem('tm-dark-mode')||'';
  renderTabs();
  renderContent();
}

function cycleTheme(){
  let i=THEMES.indexOf(document.body.className||'');
  let next=THEMES[(i+1)%THEMES.length];
  document.body.className=next;
  localStorage.setItem('tm-dark-mode',next);
}

function renderTabs(){
  let h='';
  for(let i=1;i<=6;i++) h+=`<button class="${tab===i?'active':''}" onclick="switchTab(${i})">${LABELS[i-1]}</button>`;
  document.getElementById('tabs').innerHTML=h;
}

function switchTab(n){
  saveCurrentState();
  tab=n;cardView=null;listMode='list';editingListId=null;
  localStorage.setItem('mw-tab',String(n));
  renderTabs();
  renderContent();
}

function saveCurrentState(){
  if(tab>=2&&tab<=4){
    let el=document.getElementById('editor');
    if(el) localStorage.setItem(MEMO_KEYS[tab],el.innerHTML);
  }else if(cardView){
    saveCardDetail();
  }
}

function renderContent(){
  const el=document.getElementById('content');
  if(tab===1){
    if(listMode==='create'){
      // Quick List creation - line-based input with markers
      const lines=(qlBody||'').split('\n');
      if(lines.length===0||lines[lines.length-1]!=='')lines.push('');
      let itemsHtml='';
      lines.forEach((line,i)=>{
        let prefix='';
        if(qlMarker==='bullet')prefix='<span style="color:#6b7280;font-size:18px;line-height:1;flex-shrink:0;width:20px;text-align:center">•</span>';
        else if(qlMarker==='checkbox')prefix=`<input type="checkbox" disabled style="width:18px;height:18px;flex-shrink:0;margin:0;opacity:0.6">`;
        else if(qlMarker==='number')prefix=`<span style="color:#6b7280;font-size:14px;font-weight:600;flex-shrink:0;width:24px;text-align:right;margin-right:4px">${i+1}.</span>`;
        itemsHtml+=`<div style="display:flex;align-items:center;gap:6px;min-height:36px;padding:2px 0;border-bottom:1px solid #374151">${prefix}<input type="text" value="${esc(line).replace(/"/g,'&quot;')}" oninput="updateQlLine(${i},this.value)" onkeydown="qlLineKey(event,${i})" placeholder="${i===0?'First item...':'...'}" style="flex:1;border:none;background:transparent;font-size:15px;color:inherit;outline:none;padding:6px 0;min-height:32px"></div>`;
      });
      el.innerHTML=`<div class="ql-panel"><button class="back-btn" onclick="backToListView()">← Back</button><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;font-weight:600" class="ql-label">${editingListId?'Edit List':'New List'}</span><div class="ql-markers"><button class="${qlMarker==='bullet'?'active':''}" onclick="setQlMarker('bullet')" style="font-size:18px">•</button><button class="${qlMarker==='checkbox'?'active':''}" onclick="setQlMarker('checkbox')" style="font-size:12px">☑</button><button class="${qlMarker==='number'?'active':''}" onclick="setQlMarker('number')" style="font-size:13px">1.</button></div></div><input id="ql-title" placeholder="List title" value="${esc(qlTitle)}" oninput="qlTitle=this.value"><div style="flex:1;overflow-y:auto;border:1px solid #374151;border-radius:10px;padding:8px 12px">${itemsHtml}</div><button class="save-btn" onclick="saveQuickList()">${editingListId?'Update':'Save'}</button>${editingListId?'<button class="del-footer" onclick="deleteList(\''+editingListId+'\')"><svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/></svg>Delete</button>':''}</div>`;
    }else{
      // List overview
      const lists=loadLists();
      let h=`<button class="add-btn" onclick="openListCreate()">+ New List</button><div class="card-list">`;
      if(lists.length===0){h+=`<div style="text-align:center;color:#6b7280;padding:20px;font-size:13px">No lists yet</div>`}
      lists.forEach(c=>{
        const items=(c.body||'').split('\n').filter(l=>l.trim());
        const total=items.length;
        const checked=c.checked?Object.keys(c.checked).filter(k=>c.checked[k]).length:0;
        const markerIcon=c.marker==='checkbox'?'☑ ':c.marker==='number'?'#  ':'• ';
        const preview=items.slice(0,3).map((l,i)=>(c.marker==='number'?(i+1)+'. ':markerIcon)+l).join('\n');
        const progress=c.marker==='checkbox'&&total>0?` (${checked}/${total})`:'';
        h+=`<div class="card" onclick="openListDetail('${c.id}')"><button class="del-btn" onclick="event.stopPropagation();deleteList('${c.id}')"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/></svg></button><div class="title" style="display:flex;justify-content:space-between;align-items:center;padding-right:28px"><span>${esc(c.title||'Untitled')}${progress}</span><span style="font-size:11px;color:#6b7280">${total} items</span></div><div class="preview">${esc(preview)||'Empty list'}</div></div>`;
      });
      h+=`</div>`;
      el.innerHTML=h;
    }
  }else if(tab>=2&&tab<=4){
    // Memo editor (tab 2=Memo, 3=Private, 4=Work)
    el.innerHTML=`<div id="editor" contenteditable="true"></div><button class="clear-btn" onclick="clearMemo()"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/></svg>Clear memo</button>`;
    document.getElementById('editor').innerHTML=localStorage.getItem(MEMO_KEYS[tab])||'';
    document.getElementById('editor').addEventListener('input',function(){
      clearTimeout(timer);
      timer=setTimeout(()=>{localStorage.setItem(MEMO_KEYS[tab],this.innerHTML)},400);
    });
  }else if(!cardView){
    // Card list (tab 5=People, 6=Places)
    const key=CARD_KEYS[tab];
    const icon=tab===5?'👤':'📍';
    const items=loadCards(key).sort((a,b)=>a.order-b.order);
    let h=`<button class="add-btn" onclick="addCard()">+ Add</button><div class="card-list">`;
    if(items.length===0){h+=`<div style="text-align:center;color:#6b7280;padding:20px;font-size:13px">No items yet</div>`}
    items.forEach(c=>{
      const preview=(c.body||'').replace(/<br\s*\/?>/gi,'\n').replace(/<\/div>/gi,'\n').replace(/<[^>]*>/g,'').split('\n').slice(0,3).join('\n');
      h+=`<div class="card" onclick="openCard('${c.id}')"><button class="del-btn" onclick="event.stopPropagation();deleteCard('${c.id}')"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/></svg></button><div class="title" style="padding-right:28px">${icon} ${esc(c.title||'Untitled')}</div><div class="preview">${esc(preview)||'No content'}</div></div>`;
    });
    h+=`</div>`;
    el.innerHTML=h;
  }else{
    // Card detail
    const key=CARD_KEYS[tab];
    const items=loadCards(key);
    const card=items.find(c=>c.id===cardView);
    if(!card){cardView=null;renderContent();return}
    el.innerHTML=`<button class="back-btn" onclick="backToList()">← Back</button><input type="text" id="detail-title" value="${esc(card.title).replace(/"/g,'&quot;')}" placeholder="Name" oninput="saveCardDetail()"><div id="detail-body" contenteditable="true"></div><button class="del-footer" onclick="deleteCard('${card.id}')"><svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/></svg>Delete</button>`;
    document.getElementById('detail-body').innerHTML=card.body||'';
    document.getElementById('detail-body').addEventListener('input',function(){
      clearTimeout(timer);
      timer=setTimeout(saveCardDetail,400);
    });
  }
}

function setQlMarker(m){
  const t=document.getElementById('ql-title');
  if(t)qlTitle=t.value;
  qlMarker=m;
  renderContent();
}

function updateQlLine(i,val){
  const lines=(qlBody||'').split('\n');
  while(lines.length<=i)lines.push('');
  lines[i]=val;
  qlBody=lines.join('\n');
}

function qlLineKey(e,i){
  if(e.key==='Enter'){
    e.preventDefault();
    const lines=(qlBody||'').split('\n');
    lines.splice(i+1,0,'');
    qlBody=lines.join('\n');
    renderContent();
    setTimeout(()=>{
      const inputs=document.querySelectorAll('.ql-panel input[type=text]:not(#ql-title)');
      if(inputs[i+1])inputs[i+1].focus();
    },50);
  }else if(e.key==='Backspace'&&e.target.value===''&&i>0){
    e.preventDefault();
    const lines=(qlBody||'').split('\n');
    lines.splice(i,1);
    qlBody=lines.join('\n');
    renderContent();
    setTimeout(()=>{
      const inputs=document.querySelectorAll('.ql-panel input[type=text]:not(#ql-title)');
      if(inputs[i-1]){inputs[i-1].focus();inputs[i-1].setSelectionRange(999,999)}
    },50);
  }
}

function saveQuickList(){
  const title=qlTitle.trim();
  const body=(qlBody||'').split('\n').filter(l=>l.trim()).join('\n').trim();
  if(!title&&!body){alert('Please enter a title or items');return}
  const lists=loadLists();
  if(editingListId){
    const idx=lists.findIndex(l=>l.id===editingListId);
    if(idx>=0){lists[idx].title=title||'Untitled';lists[idx].body=body;lists[idx].marker=qlMarker;}
    saveLists(lists);
  }else{
    const newList={id:uid(),title:title||'Untitled',body:body,marker:qlMarker,color:'#1f2937',status:'active',dueDate:null,dueTime:null,reminderEnabled:false,checked:{},order:lists.length,createdAt:new Date().toISOString(),completedAt:null};
    lists.unshift(newList);
    saveLists(lists);
  }
  qlTitle='';qlBody='';editingListId=null;listMode='list';
  renderContent();
}

function openListCreate(){
  qlTitle='';qlBody='';qlMarker='bullet';editingListId=null;
  listMode='create';
  renderContent();
}

function openListDetail(id){
  const lists=loadLists();
  const item=lists.find(l=>l.id===id);
  if(!item)return;
  qlTitle=item.title||'';
  qlBody=item.body||'';
  qlMarker=item.marker||'bullet';
  editingListId=id;
  listMode='create';
  renderContent();
}

function backToListView(){
  qlTitle='';qlBody='';editingListId=null;listMode='list';
  renderContent();
}

function deleteList(id){
  if(!confirm('Delete this list?'))return;
  let lists=loadLists();
  lists=lists.filter(l=>l.id!==id);
  saveLists(lists);
  if(editingListId===id){editingListId=null;listMode='list';}
  renderContent();
}

function deleteCard(id){
  if(!confirm('Delete this item?'))return;
  const key=CARD_KEYS[tab];
  let items=loadCards(key);
  items=items.filter(c=>c.id!==id);
  saveCards(key,items);
  if(cardView===id)cardView=null;
  renderContent();
}

function clearMemo(){
  if(!confirm('Clear this memo?'))return;
  localStorage.setItem(MEMO_KEYS[tab],'');
  renderContent();
}

function addCard(){
  const key=CARD_KEYS[tab];
  const items=loadCards(key);
  const card={id:uid(),title:'',body:'',color:'#1f2937',order:items.length,createdAt:new Date().toISOString()};
  items.push(card);
  saveCards(key,items);
  cardView=card.id;
  renderContent();
}

function openCard(id){cardView=id;renderContent()}
function backToList(){saveCardDetail();cardView=null;renderContent()}

function saveCardDetail(){
  if(!cardView)return;
  const key=CARD_KEYS[tab];
  let items=loadCards(key);
  const titleEl=document.getElementById('detail-title');
  const bodyEl=document.getElementById('detail-body');
  if(!titleEl||!bodyEl)return;
  items=items.map(c=>c.id===cardView?{...c,title:titleEl.value,body:bodyEl.innerHTML}:c);
  saveCards(key,items);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='hidden')saveCurrentState();
  else{document.body.className=localStorage.getItem('tm-dark-mode')||'';renderContent();}
});

init();

// Swipe to switch tabs with visual feedback & browser gesture prevention
(function(){
  const content=document.getElementById('content');
  let sx=0,sy=0,dx=0,dy=0,startTime=0,isHorizontal=null,swiping=false;
  const THRESHOLD=50,VELOCITY_THRESHOLD=0.3,MAX_DRAG=120;

  function isEditing(){
    const ae=document.activeElement;
    if(!ae)return false;
    return ae.isContentEditable||ae.tagName==='INPUT'||ae.tagName==='TEXTAREA';
  }

  content.addEventListener('touchstart',function(e){
    if(isEditing())return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
    dx=0;dy=0;startTime=Date.now();isHorizontal=null;swiping=false;
    content.style.transition='none';
  },{passive:true});

  content.addEventListener('touchmove',function(e){
    if(isEditing())return;
    dx=e.touches[0].clientX-sx;
    dy=e.touches[0].clientY-sy;
    // Determine direction on first significant movement
    if(isHorizontal===null&&(Math.abs(dx)>8||Math.abs(dy)>8)){
      isHorizontal=Math.abs(dx)>Math.abs(dy);
    }
    if(!isHorizontal)return;
    // Prevent browser back/forward gesture
    e.preventDefault();
    swiping=true;
    // Check if at boundary (no more tabs in that direction)
    const atLeft=tab<=1&&dx>0;
    const atRight=tab>=6&&dx<0;
    // Apply resistance at boundaries
    let offset=dx;
    if(atLeft||atRight){offset=dx*0.2;}
    else{offset=Math.max(-MAX_DRAG,Math.min(MAX_DRAG,dx));}
    content.style.transform=`translateX(${offset}px)`;
    content.style.opacity=String(1-Math.abs(offset)/(MAX_DRAG*2.5));
  },{passive:false});

  content.addEventListener('touchend',function(){
    if(!swiping){content.style.transform='';content.style.opacity='';return}
    const elapsed=Date.now()-startTime;
    const velocity=Math.abs(dx)/elapsed; // px/ms
    const triggered=Math.abs(dx)>THRESHOLD||velocity>VELOCITY_THRESHOLD;
    content.style.transition='transform 0.2s ease,opacity 0.2s ease';
    if(triggered&&dx<0&&tab<6){
      content.style.transform='translateX(-60px)';content.style.opacity='0.3';
      setTimeout(()=>{content.style.transition='none';content.style.transform='';content.style.opacity='';switchTab(tab+1)},150);
    }else if(triggered&&dx>0&&tab>1){
      content.style.transform='translateX(60px)';content.style.opacity='0.3';
      setTimeout(()=>{content.style.transition='none';content.style.transform='';content.style.opacity='';switchTab(tab-1)},150);
    }else{
      content.style.transform='translateX(0)';content.style.opacity='1';
    }
    swiping=false;isHorizontal=null;
  },{passive:true});
})();
</script>
