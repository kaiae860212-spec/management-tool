<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="memo-manifest.json">
<title>Quick Memo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111827;color:#e5e7eb;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;background:#030712;padding:0 16px;height:44px;border-bottom:1px solid #1f2937;flex-shrink:0}
header h1{font-size:13px;font-weight:600;color:#f3f4f6;display:flex;align-items:center;gap:6px}
header .icon{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#1e3a8a,#1e1b6e,#0f0a3e);display:flex;align-items:center;justify-content:center}
header .icon svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.theme-btn{width:32px;height:32px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.theme-btn svg{width:14px;height:14px;stroke:#6b7280;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tabs{display:flex;gap:4px;padding:8px 12px;background:#030712;border-bottom:1px solid #1f2937;flex-shrink:0}
.tabs button{flex:1;padding:8px 0;font-size:12px;font-weight:600;border:1px solid #374151;border-radius:8px;background:none;color:#6b7280;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.2s}
.tabs button.active{color:#60a5fa;border-color:#60a5fa;background:rgba(96,165,250,0.1)}
.editor-wrap{flex:1;padding:8px 12px 12px;display:flex;flex-direction:column;overflow:hidden}
.editor{width:100%;flex:1;padding:12px;border:1px solid #374151;border-radius:10px;font-size:14px;background:#111827;color:#d1d5db;overflow-y:auto;outline:none;-webkit-appearance:none;white-space:pre-wrap;word-break:break-word;min-height:100px}
.editor:focus{border-color:#3b82f6}
.editor:empty::before{content:attr(data-placeholder);color:#4b5563;pointer-events:none}
.status{font-size:10px;color:#6b7280;text-align:right;padding:4px 0;flex-shrink:0}

/* Light mode */
body.light-mode{background:#f1f5f9;color:#0f172a}
body.light-mode header{background:#ffffff;border-bottom-color:#cbd5e1}
body.light-mode header h1{color:#0f172a}
body.light-mode .tabs{background:#ffffff;border-bottom-color:#cbd5e1}
body.light-mode .tabs button{border-color:#cbd5e1;color:#475569}
body.light-mode .tabs button.active{color:#2563eb;border-color:#2563eb;background:rgba(37,99,235,0.06)}
body.light-mode .editor{background:#ffffff;border-color:#cbd5e1;color:#0f172a}
body.light-mode .editor:focus{border-color:#2563eb}
body.light-mode .editor:empty::before{color:#94a3b8}

/* Ivory Warm */
body.ivory-warm{background:#faf7f2;color:#3d3329}
body.ivory-warm header{background:#f5f0e8;border-bottom-color:#e8dfd4}
body.ivory-warm header h1{color:#3d3329}
body.ivory-warm .tabs{background:#f5f0e8;border-bottom-color:#e8dfd4}
body.ivory-warm .tabs button{border-color:#e8dfd4;color:#8b7355}
body.ivory-warm .tabs button.active{color:#b8860b;border-color:#b8860b;background:rgba(184,134,11,0.06)}
body.ivory-warm .editor{background:#fffef8;border-color:#e8dfd4;color:#3d3329}

/* Ivory Cool */
body.ivory-cool{background:#f5f5f0;color:#2d3436}
body.ivory-cool header{background:#eceee8;border-bottom-color:#d4d9cd}
body.ivory-cool header h1{color:#2d3436}
body.ivory-cool .tabs{background:#eceee8;border-bottom-color:#d4d9cd}
body.ivory-cool .tabs button{border-color:#d4d9cd;color:#636e72}
body.ivory-cool .tabs button.active{color:#00897b;border-color:#00897b;background:rgba(0,137,123,0.06)}
body.ivory-cool .editor{background:#fafcf7;border-color:#d4d9cd;color:#2d3436}

/* Ivory Pink */
body.ivory-pink{background:#fdf2f4;color:#4a2030}
body.ivory-pink header{background:#fae8ec;border-bottom-color:#f0ced6}
body.ivory-pink header h1{color:#4a2030}
body.ivory-pink .tabs{background:#fae8ec;border-bottom-color:#f0ced6}
body.ivory-pink .tabs button{border-color:#f0ced6;color:#9e4a6a}
body.ivory-pink .tabs button.active{color:#d63384;border-color:#d63384;background:rgba(214,51,132,0.06)}
body.ivory-pink .editor{background:#fffafc;border-color:#f0ced6;color:#4a2030}

/* Ivory Blue */
body.ivory-blue{background:#f0f6fc;color:#1a365d}
body.ivory-blue header{background:#e3eff8;border-bottom-color:#bed3e8}
body.ivory-blue header h1{color:#1a365d}
body.ivory-blue .tabs{background:#e3eff8;border-bottom-color:#bed3e8}
body.ivory-blue .tabs button{border-color:#bed3e8;color:#4a7ab5}
body.ivory-blue .tabs button.active{color:#1976d2;border-color:#1976d2;background:rgba(25,118,210,0.06)}
body.ivory-blue .editor{background:#f8fbff;border-color:#bed3e8;color:#1a365d}
</style>
</head>
<body>
<header>
  <h1><span class="icon"><svg viewBox="0 0 24 24"><path d="M4 17V9l8 7 8-7v8"/></svg></span>Quick Memo</h1>
  <button class="theme-btn" onclick="cycleTheme()" aria-label="Theme"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 0111.21 3 7 7 0 0012 21a7 7 0 009-8.21z"/></svg></button>
</header>
<div class="tabs" id="tabs"></div>
<div class="editor-wrap">
  <div class="editor" id="editor" contenteditable="true" data-placeholder="Write here..." oninput="save()"></div>
  <div class="status" id="status">Saved</div>
</div>

<script>
const MEMO_KEY_PREFIX='tm-memo-';
const TAB_KEY='tm-memo-tab';
const DARK_KEY='tm-dark-mode';
const themes=['','light-mode','ivory-warm','ivory-cool','ivory-pink','ivory-blue'];

let currentTab=parseInt(localStorage.getItem(TAB_KEY))||1;
let saveTimeout=null;

function loadTheme(){
  const mode=localStorage.getItem(DARK_KEY)||'';
  document.body.className=mode;
}

function cycleTheme(){
  const current=document.body.className||'';
  const idx=themes.indexOf(current);
  const next=themes[(idx+1)%themes.length];
  document.body.className=next;
  localStorage.setItem(DARK_KEY,next);
}

function renderTabs(){
  let html='';
  for(let i=1;i<=4;i++){
    html+=`<button class="${currentTab===i?'active':''}" onclick="switchTab(${i})">Memo ${i}</button>`;
  }
  document.getElementById('tabs').innerHTML=html;
}

function switchTab(n){
  save();
  currentTab=n;
  localStorage.setItem(TAB_KEY,String(n));
  renderTabs();
  loadContent();
}

function loadContent(){
  const content=localStorage.getItem(MEMO_KEY_PREFIX+currentTab)||'';
  document.getElementById('editor').innerHTML=content;
  updateStatus('Loaded');
}

function save(){
  const el=document.getElementById('editor');
  if(!el)return;
  localStorage.setItem(MEMO_KEY_PREFIX+currentTab,el.innerHTML);
  updateStatus('Saved');
}

function updateStatus(msg){
  document.getElementById('status').textContent=msg;
}

// Auto-save with debounce
document.getElementById('editor').addEventListener('input',function(){
  if(saveTimeout)clearTimeout(saveTimeout);
  updateStatus('Editing...');
  saveTimeout=setTimeout(()=>{save()},500);
});

// Save on blur/visibility change
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='hidden')save();
  if(document.visibilityState==='visible'){loadTheme();loadContent();}
});
window.addEventListener('blur',save);

// Init
loadTheme();
renderTabs();
loadContent();

// Auto-focus editor on load
setTimeout(()=>{document.getElementById('editor').focus()},100);
</script>
</body>
</html>
