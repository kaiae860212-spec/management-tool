// --- Long-press drag reorder for Today's Focus ---
let dragEl=null,dragId=null,dragStartY=0,dragOffsetY=0,longPressTimer=null,isDragging=false;

function initTodayDrag(){
  const list=document.getElementById('today-list');
  if(!list)return;
  const items=list.querySelectorAll('.today-item');
  items.forEach(item=>{
    item.addEventListener('touchstart',onDragTouchStart,{passive:false});
  });
}

function onDragTouchStart(e){
  const item=e.currentTarget;
  dragId=item.getAttribute('data-id');
  dragStartY=e.touches[0].clientY;
  longPressTimer=setTimeout(()=>{
    isDragging=true;
    dragEl=item;
    // Prevent click from firing after drag
    item.setAttribute('data-dragging','true');
    item.style.opacity='0.7';
    item.style.zIndex='1000';
    item.style.boxShadow='0 4px 20px rgba(0,0,0,0.5)';
    item.style.transition='none';
    // Prevent panel scrolling during drag
    document.getElementById('p2').style.overflowY='hidden';
    // Vibrate for tactile feedback if available
    if(navigator.vibrate)navigator.vibrate(30);
    document.addEventListener('touchmove',onDragTouchMove,{passive:false});
    document.addEventListener('touchend',onDragTouchEnd,{passive:false});
  },400);
  // Cancel long press if finger moves too much
  const cancelCheck=(ev)=>{
    if(Math.abs(ev.touches[0].clientY-dragStartY)>10){
      clearTimeout(longPressTimer);
      document.removeEventListener('touchmove',cancelCheck);
    }
  };
  document.addEventListener('touchmove',cancelCheck,{passive:true});
  item.addEventListener('touchend',()=>{
    clearTimeout(longPressTimer);
    document.removeEventListener('touchmove',cancelCheck);
  },{once:true});
}

function onDragTouchMove(e){
  if(!isDragging||!dragEl)return;
  e.preventDefault();
  e.stopPropagation();
  const y=e.touches[0].clientY;
  const dy=y-dragStartY;
  dragEl.style.transform='translateY('+dy+'px)';

  // Find swap target
  const list=document.getElementById('today-list');
  const items=[...list.querySelectorAll('.today-item')];
  const dragIdx=items.indexOf(dragEl);
  const dragRect=dragEl.getBoundingClientRect();
  const dragCenter=dragRect.top+dragRect.height/2;

  for(let i=0;i<items.length;i++){
    if(i===dragIdx)continue;
    const rect=items[i].getBoundingClientRect();
    const center=rect.top+rect.height/2;
    if(dragIdx<i&&dragCenter>center){
      list.insertBefore(dragEl,items[i].nextSibling);
      dragStartY=y;
      dragEl.style.transform='translateY(0)';
      break;
    }else if(dragIdx>i&&dragCenter<center){
      list.insertBefore(dragEl,items[i]);
      dragStartY=y;
      dragEl.style.transform='translateY(0)';
      break;
    }
  }
}

function onDragTouchEnd(){
  if(!isDragging)return;
  isDragging=false;
  document.removeEventListener('touchmove',onDragTouchMove);
  document.removeEventListener('touchend',onDragTouchEnd);
  // Restore panel scrolling
  document.getElementById('p2').style.overflowY='auto';
  if(dragEl){
    dragEl.style.opacity='';
    dragEl.style.zIndex='';
    dragEl.style.boxShadow='';
    dragEl.style.transform='';
    dragEl.style.transition='';
    // Keep data-dragging for a moment to prevent click
    const el=dragEl;
    setTimeout(()=>{if(el)el.removeAttribute('data-dragging');},100);
  }
  // Save new order — preserve all item IDs (tasks, notes, lists)
  const list=document.getElementById('today-list');
  if(list){
    const newIds=[...list.querySelectorAll('.today-item')].map(el=>el.getAttribute('data-id'));
    todayIds=newIds;
    saveToday(todayIds);
    render(['tasks']);
  }
  dragEl=null;dragId=null;
}

// --- Phase 2: Streak Tracker ---
function getStreak(rec){
  const completed=(rec.completedDates||[]).slice().sort();
  if(completed.length===0)return 0;
  // Count consecutive completions ending at the most recent
  let streak=1;
  for(let i=completed.length-1;i>0;i--){
    const curr=new Date(completed[i]+'T00:00:00');
    const prev=new Date(completed[i-1]+'T00:00:00');
    const interval=rec.repeat==='weekly'?7:rec.repeat==='biweekly'?14:rec.repeat==='monthly'?30:rec.repeat==='yearly'?365:(rec.days||1);
    const diffDays=Math.round((curr-prev)/(86400000));
    // Allow some tolerance for monthly/yearly
    if(rec.repeat==='monthly'){
      if(diffDays>=27&&diffDays<=33)streak++;
      else break;
    }else if(rec.repeat==='yearly'){
      if(diffDays>=360&&diffDays<=370)streak++;
      else break;
    }else{
      if(diffDays===interval)streak++;
      else break;
    }
  }
  return streak;
}
function streakBadge(rec){
  const s=getStreak(rec);
  if(s<2)return '';
  return `<span class="streak-badge">🔥${s}</span>`;
}

// --- Phase 2: Pomodoro Timer (timestamp-based for screen-off resilience) ---
let pomoState='idle'; // idle, focus, break
let pomoTimeLeft=25*60; // seconds
let pomoInterval=null;
let pomoLinkedItem=null;
let pomoStartedAt=null; // timestamp when timer started/resumed
let pomoTotalDuration=25*60; // total seconds for current phase
const POMO_FOCUS=25*60;
const POMO_BREAK=5*60;

function startPomo(){
  // Request notification permission when starting timer
  requestNotificationPermission();
  // Schedule SW notification as backup in case app is closed
  if(navigator.serviceWorker&&navigator.serviceWorker.controller){
    const duration=pomoState==='idle'?POMO_FOCUS:(pomoState==='break'?pomoTimeLeft:pomoTimeLeft);
    navigator.serviceWorker.controller.postMessage({type:'SCHEDULE_NOTIFICATION',title:pomoState==='break'?'Break over!':'Focus done! Take a break',body:'Timer completed',delay:duration*1000,tag:'pomo-scheduled'});
  }
  if(pomoState==='idle'){
    pomoState='focus';
    pomoTimeLeft=POMO_FOCUS;
    pomoTotalDuration=POMO_FOCUS;
  }
  pomoStartedAt=Date.now();
  if(pomoInterval)clearInterval(pomoInterval);
  pomoInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-pomoStartedAt)/1000);
    pomoTimeLeft=pomoTotalDuration-elapsed;
    if(pomoTimeLeft<=0){
      clearInterval(pomoInterval);pomoInterval=null;
      if(pomoState==='focus'){
        pomoState='break';pomoTimeLeft=POMO_BREAK;pomoTotalDuration=POMO_BREAK;
        notifyPomo('Focus done! 5min break');
        startPomo();
      }else{
        pomoState='idle';pomoTimeLeft=POMO_FOCUS;pomoTotalDuration=POMO_FOCUS;pomoStartedAt=null;
        notifyPomo('Break over!');
      }
    }
    updatePomoDisplay();
  },1000);
  updatePomoDisplay();
}
function pausePomo(){
  if(pomoInterval){clearInterval(pomoInterval);pomoInterval=null}
  // Calculate remaining time accurately
  if(pomoStartedAt){
    const elapsed=Math.floor((Date.now()-pomoStartedAt)/1000);
    pomoTimeLeft=Math.max(0,pomoTotalDuration-elapsed);
    pomoTotalDuration=pomoTimeLeft;
    pomoStartedAt=null;
  }
  updatePomoDisplay();
}
function resetPomo(){
  if(pomoInterval){clearInterval(pomoInterval);pomoInterval=null}
  pomoState='idle';pomoTimeLeft=POMO_FOCUS;pomoTotalDuration=POMO_FOCUS;pomoLinkedItem=null;pomoStartedAt=null;
  updatePomoDisplay();
}
function updatePomoDisplay(){
  const el=document.getElementById('pomo-display');
  if(!el)return;
  const m=Math.floor(pomoTimeLeft/60);
  const s=pomoTimeLeft%60;
  const timeStr=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  const isRunning=!!pomoInterval;
  if(pomoState==='idle'){
    el.innerHTML=`<div style="display:flex;gap:6px;margin:8px 0"><button onclick="startPomoFocus()" style="flex:1;min-height:32px;padding:0 12px;border:1px solid #374151;border-radius:8px;background:rgba(31,41,55,0.8);color:#d1d5db;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px">⏳ FOCUS 25min</button><button onclick="startPomoBreak()" style="flex:1;min-height:32px;padding:0 12px;border:1px solid #374151;border-radius:8px;background:rgba(31,41,55,0.8);color:#d1d5db;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px">☕ BREAK 5min</button></div>`;
  }else{
    const label=pomoState==='focus'?'⏳ FOCUS':'☕ BREAK';
    el.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin:8px 0;padding:6px 12px;border:1px solid #374151;border-radius:8px;background:rgba(31,41,55,0.8)"><span style="font-size:13px;font-weight:700;color:#f1f5f9;font-variant-numeric:tabular-nums">${label} ${timeStr}</span><span style="display:flex;gap:2px">${isRunning?`<button onclick="pausePomo()" style="width:28px;height:28px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer" aria-label="Pause"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#d1d5db;fill:none;stroke-width:2.5"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg></button>`:`<button onclick="startPomo()" style="width:28px;height:28px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer" aria-label="Resume"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#d1d5db;fill:none;stroke-width:2.5"><path d="M5 3l14 9-14 9V3z"/></svg></button>`}<button onclick="resetPomo()" style="width:28px;height:28px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer" aria-label="Reset"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#9ca3af;fill:none;stroke-width:2"><path d="M6 18L18 6M6 6l12 12"/></svg></button></span></div>`;
  }
}
function notifyPomo(msg){
  // Use SW showNotification (works in PWA standalone mode)
  if(Notification.permission==='granted'&&navigator.serviceWorker&&navigator.serviceWorker.controller){
    navigator.serviceWorker.ready.then(reg=>{
      reg.showNotification('⏳ '+msg,{tag:'pomo',vibrate:[200,100,200],requireInteraction:true});

  }else if(Notification.permission==='granted'){

  }
  if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);
}
function startPomoFocus(){

}

// Auto-refresh when returning to this tab
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'){
    dismissedIds=loadDismissed();
    // Recalculate pomo timer after screen-off
    if(pomoState!=='idle'&&pomoStartedAt&&pomoInterval){
      const elapsed=Math.floor((Date.now()-pomoStartedAt)/1000);
      pomoTimeLeft=Math.max(0,pomoTotalDuration-elapsed);
      if(pomoTimeLeft<=0){
        clearInterval(pomoInterval);pomoInterval=null;
        if(pomoState==='focus'){
          pomoState='break';pomoTimeLeft=POMO_BREAK;pomoTotalDuration=POMO_BREAK;
          notifyPomo('Focus done! 5min break');
          startPomo();
        }else{
          pomoState='idle';pomoTimeLeft=POMO_FOCUS;pomoTotalDuration=POMO_FOCUS;pomoStartedAt=null;
          notifyPomo('Break over!');
        }
      }
      updatePomoDisplay();
    }
    render();
  }
});
window.addEventListener('pageshow',function(e){
  if(e.persisted){
    dismissedIds=loadDismissed();
    render();
  }
});
window.addEventListener('focus',function(){
  dismissedIds=loadDismissed();
  render();
});

// --- Unified Properties Modal for Notes/Lists ---
function showItemPropertiesModal(itemId,itemType){
  // itemType: 'note' or 'list'
  const item=itemType==='note'?notes.find(n=>n.id===itemId):lists.find(l=>l.id===itemId);
  if(!item)return;
  const isInToday=todayIds.includes(itemId);
  const nodue=!item.dueDate;
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.7);display:flex;align-items:flex-start;justify-content:center;padding:16px;padding-top:60px';
  overlay.innerHTML=`<div style="background:#1f2937;border:1px solid #374151;border-radius:12px;padding:20px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px">
    <div style="font-size:13px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em">${itemType==='note'?'Note':'List'} Properties</div>
    <div style="font-size:14px;color:#f1f5f9;padding:4px 0">${esc(item.title||'Untitled')}</div>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="prop-date" type="date" value="${item.dueDate||todayStr()}" onchange="document.getElementById('prop-today').checked=this.value==='${todayStr()}'" ${nodue?'disabled style="flex:1;min-height:40px;padding:8px 12px;border:1px solid #374151;border-radius:8px;font-size:14px;background:#111827;color:#f3f4f6;outline:none;color-scheme:dark;opacity:0.4"':'style="flex:1;min-height:40px;padding:8px 12px;border:1px solid #374151;border-radius:8px;font-size:14px;background:#111827;color:#f3f4f6;outline:none;color-scheme:dark"'}>
      <input id="prop-time" type="time" value="${item.dueTime||item.reminder||''}" ${nodue?'disabled style="width:110px;min-height:40px;padding:8px 12px;border:1px solid #374151;border-radius:8px;font-size:14px;background:#111827;color:#f3f4f6;outline:none;color-scheme:dark;opacity:0.4"':'style="width:110px;min-height:40px;padding:8px 12px;border:1px solid #374151;border-radius:8px;font-size:14px;background:#111827;color:#f3f4f6;outline:none;color-scheme:dark"'}>
      <button id="prop-bell" onclick="this.dataset.on=this.dataset.on==='true'?'false':'true';this.querySelector('svg').style.stroke=this.dataset.on==='true'?'#fbbf24':'#6b7280'" data-on="${item.reminderEnabled?'true':'false'}" style="width:36px;height:36px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:${item.reminderEnabled?'#fbbf24':'#6b7280'};fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg></button>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#9ca3af"><input type="checkbox" id="prop-nodue" ${nodue?'checked':''} onchange="const r=document.getElementById('prop-date');const tm=document.getElementById('prop-time');if(this.checked){r.disabled=true;tm.disabled=true;r.style.opacity='0.4';tm.style.opacity='0.4'}else{r.disabled=false;tm.disabled=false;r.style.opacity='1';tm.style.opacity='1'}" style="width:16px;height:16px;accent-color:#1d4ed8">No due date</label>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#d1d5db"><input type="checkbox" id="prop-today" ${isInToday?'checked':''} style="width:16px;height:16px;accent-color:#1d4ed8"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg> Today's FocusAdd to Focus</label>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button id="prop-cancel" style="min-height:40px;padding:0 16px;border:1px solid #374151;border-radius:8px;background:none;color:#9ca3af;font-size:14px;cursor:pointer">Cancel</button>
      <button id="prop-save" style="min-height:40px;padding:0 16px;border:none;border-radius:8px;background:linear-gradient(to right,#374151,#1e3a5f,#374151);color:#fff;font-size:14px;font-weight:600;cursor:pointer">Save</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',function(e){if(e.target===overlay)document.body.removeChild(overlay)});
  document.getElementById('prop-cancel').addEventListener('click',function(){document.body.removeChild(overlay)});
  document.getElementById('prop-save').addEventListener('click',function(){
    const nodue2=document.getElementById('prop-nodue').checked;
    const newDate=nodue2?null:document.getElementById('prop-date').value||null;
    const newTime=nodue2?null:document.getElementById('prop-time').value||null;
    const reminderEnabled=document.getElementById('prop-bell').dataset.on==='true';
    const wantToday=document.getElementById('prop-today').checked;
    if(itemType==='note'){
      notes=notes.map(n=>n.id===itemId?{...n,dueDate:newDate,dueTime:newTime,reminderEnabled,updatedAt:new Date().toISOString()}:n);
      saveNotes(notes);
    }else{
      lists=lists.map(l=>l.id===itemId?{...l,dueDate:newDate,dueTime:newTime,reminderEnabled,updatedAt:new Date().toISOString()}:l);
      saveLists(lists);
    }
    if(wantToday&&!todayIds.includes(itemId)){todayIds.push(itemId);dismissedIds=dismissedIds.filter(i=>i!==itemId);saveDismissed(dismissedIds);saveToday(todayIds)}
    else if(!wantToday&&todayIds.includes(itemId)){todayIds=todayIds.filter(i=>i!==itemId);saveToday(todayIds)}
    document.body.removeChild(overlay);
    if(itemType==='note')renderNotes(document.getElementById('p3'));
    else renderLists(document.getElementById('p4'));
    render(['tasks','cal']);
    if(reminderEnabled&&newDate===todayStr()){scheduleNotification(item.title||'Untitled',newTime||'07:00',itemId)}
  });
}

// --- Service Worker & Notifications ---
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    console.log('SW registered');
    // Request notification permission on first load
    requestNotificationPermission().then(permission=>{
      if(permission==='granted'){
        scheduleRemindersForToday();
      }
    });
  }).catch(err=>console.log('SW registration failed:',err));
}else{
  // No SW support, still try to schedule with Notification API
  requestNotificationPermission().then(permission=>{
    if(permission==='granted')scheduleRemindersForToday();
  });
}

function requestNotificationPermission(){
  if(!('Notification' in window))return Promise.resolve('denied');
  if(Notification.permission==='granted')return Promise.resolve('granted');
  if(Notification.permission==='denied')return Promise.resolve('denied');
  return Notification.requestPermission();
}

function scheduleRemindersForToday(){
  requestNotificationPermission().then(permission=>{
    if(permission!=='granted')return;
    const today=todayStr();
    // Check tasks with reminderEnabled
    tasks.filter(t=>t.status==='active'&&t.dueDate===today&&t.reminderEnabled).forEach(t=>{
      const time=t.dueTime||'07:00';
      scheduleNotification(t.title,time,t.id);
    });
    // Check recurring with next date = today and reminderEnabled
    recurring.forEach(r=>{
      if(r.reminderEnabled){
        const nextDate=getNextRecurringDate(r);
        if(nextDate===today){const time=r.dueTime||'07:00';scheduleNotification(r.title,time,r.id)}
      }
    });
    // Check notes with reminderEnabled
    notes.filter(n=>n.status!=='completed'&&n.dueDate===today&&n.reminderEnabled).forEach(n=>{
      const time=n.dueTime||'07:00';
      scheduleNotification(n.title||'Note',time,n.id);
    });
    // Check lists with reminderEnabled
    lists.filter(l=>l.status!=='completed'&&l.dueDate===today&&l.reminderEnabled).forEach(l=>{
      const time=l.dueTime||'07:00';
      scheduleNotification(l.title||'List',time,l.id);
    });
  });
}

function scheduleNotification(title,reminderTime,id){
  const now=new Date();
  const today=todayStr();
  const [h,m]=reminderTime.split(':').map(Number);
  const target=new Date(today+'T'+String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':00');
  const delay=target-now;
  if(delay<=0)return;
  setTimeout(()=>{
    if(Notification.permission!=='granted')return;
    // Use SW showNotification (works in PWA standalone mode)
    if(navigator.serviceWorker&&navigator.serviceWorker.controller){
      navigator.serviceWorker.ready.then(reg=>{
        reg.showNotification('📋 '+title,{body:'Scheduled reminder',tag:'reminder-'+id,vibrate:[200,100,200],requireInteraction:true});
      });
    }else{
      try{new Notification('📋 '+title,{body:'Scheduled reminder',tag:'reminder-'+id,vibrate:[200,100,200]})}catch(e){}
    }
  },delay);
}

function showReminderSetting(itemId,itemType){
  // itemType: 'task', 'recurring'
  const item=itemType==='task'?tasks.find(t=>t.id===itemId):recurring.find(r=>r.id===itemId);
  if(!item)return;
  const currentReminder=item.reminder||'';
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.7);display:flex;align-items:flex-start;justify-content:center;padding:16px;padding-top:60px';
  overlay.innerHTML=`<div style="background:#1f2937;border:1px solid #374151;border-radius:12px;padding:20px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px">
    <div style="font-size:14px;font-weight:600;color:#f1f5f9">🔔 Reminder Settings</div>
    <div style="font-size:12px;color:#9ca3af">${item.title}</div>
    <input id="reminder-time" type="time" value="${currentReminder}" style="width:100%;min-height:44px;padding:10px 12px;border:1px solid #374151;border-radius:8px;font-size:16px;background:#111827;color:#f3f4f6;outline:none;color-scheme:dark">
    <div style="display:flex;gap:8px">
      <button id="reminder-clear" style="flex:1;min-height:40px;border:1px solid #374151;border-radius:8px;background:none;color:#9ca3af;font-size:13px;cursor:pointer">Remove</button>
      <button id="reminder-save" style="flex:1;min-height:40px;border:none;border-radius:8px;background:linear-gradient(to right,#374151,#1e3a5f,#374151);color:#fff;font-size:13px;font-weight:600;cursor:pointer">Set</button>
    </div>
    <button id="reminder-cancel" style="min-height:36px;border:none;background:none;color:#6b7280;font-size:13px;cursor:pointer">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',function(e){if(e.target===overlay)document.body.removeChild(overlay)});
  document.getElementById('reminder-cancel').addEventListener('click',function(){document.body.removeChild(overlay)});
  document.getElementById('reminder-clear').addEventListener('click',function(){
    if(itemType==='task'){tasks=tasks.map(t=>t.id===itemId?{...t,reminder:null}:t);saveTasks(tasks)}
    else{recurring=recurring.map(r=>r.id===itemId?{...r,reminder:null}:r);saveRecurring(recurring)}
    document.body.removeChild(overlay);
    render(['tasks']);
  });
  document.getElementById('reminder-save').addEventListener('click',function(){
    const time=document.getElementById('reminder-time').value;
    if(!time)return;
    requestNotificationPermission().then(permission=>{
      if(permission!=='granted'){alert('Notifications not allowed. Please enable in browser settings.');return}
      if(itemType==='task'){tasks=tasks.map(t=>t.id===itemId?{...t,reminder:time}:t);saveTasks(tasks)}
      else{recurring=recurring.map(r=>r.id===itemId?{...r,reminder:time}:r);saveRecurring(recurring)}
      // Schedule if today
      const today=todayStr();
      const item2=itemType==='task'?tasks.find(t=>t.id===itemId):recurring.find(r=>r.id===itemId);
      if(item2){
        const dueDate=itemType==='task'?item2.dueDate:getNextRecurringDate(item2);
        if(dueDate===today)scheduleNotification(item2.title,time,itemId);
      }
      document.body.removeChild(overlay);
      render(['tasks']);
    });
  });
}
</script>
