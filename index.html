<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Management Tool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111827;color:#e5e7eb;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-x:none}
header{display:flex;align-items:center;justify-content:space-between;background:#030712;padding:0 16px;height:48px;border-bottom:1px solid #1f2937;flex-shrink:0}
header h1{font-size:14px;font-weight:600;color:#f3f4f6;display:flex;align-items:center;gap:8px}
header .icon{width:24px;height:24px;border-radius:6px;background:linear-gradient(to right,#374151,#1e3a5f,#374151);display:flex;align-items:center;justify-content:center}
header .icon svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
header .fs-btn{width:34px;height:34px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
header .fs-btn svg{width:16px;height:16px;stroke:#6b7280;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
header .fs-btn:active{background:rgba(55,65,81,0.5)}
header .fs-btn:active svg{stroke:#60a5fa}
.tabs{display:flex;background:#030712;border-bottom:1px solid #1f2937;flex-shrink:0}
.tabs button{flex:1;padding:14px 0;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;border:none;border-bottom:2px solid transparent;background:none;color:#6b7280;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color 0.2s}
.tabs button.active{color:#60a5fa;border-bottom-color:#60a5fa}

/* Swipe panels */
.swipe-wrapper{flex:1;overflow:hidden;position:relative}
.swipe-track{display:flex;height:100%;width:500%;will-change:transform}
.swipe-track.animating{transition:transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)}
.panel{width:calc(100vw);height:100%;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:20px}

.form{padding:12px;background:rgba(31,41,55,0.6);border:1px solid #374151;border-radius:12px;display:flex;flex-direction:column;gap:8px}
.form input[type=text]{width:100%;min-height:40px;padding:10px 12px;border:1px solid #374151;border-radius:8px;font-size:15px;background:#111827;color:#f3f4f6;outline:none;-webkit-appearance:none}
.form input[type=date]{width:100%;min-height:40px;padding:10px 12px;border:1px solid #374151;border-radius:8px;font-size:15px;background:#111827;color:#f3f4f6;outline:none;-webkit-appearance:none;color-scheme:dark}
.form input[type=date]:invalid{color:#4b5563}
.form input[type=text]:focus,.form input[type=date]:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,0.3)}
.form input::placeholder{color:#4b5563}
.form label.check{display:flex;align-items:center;gap:8px;font-size:13px;color:#d1d5db;padding:2px 0}
.form label.check input{width:18px;height:18px;accent-color:#1d4ed8}
.btn{min-height:40px;width:33%;border:none;border-radius:8px;font-size:14px;font-weight:600;color:#fff;background:linear-gradient(to right,#374151,#1e3a5f,#374151);cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:0.8}
.section-title{font-size:14px;font-weight:700;color:#d1d5db;text-transform:uppercase;letter-spacing:0.05em;display:flex;align-items:center;gap:8px;padding-bottom:8px}
.section-title .badge{width:22px;height:22px;border-radius:6px;background:linear-gradient(to right,#374151,#1e3a5f,#374151);display:flex;align-items:center;justify-content:center}
.section-title .badge svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.section-title .count{color:#6b7280;font-weight:500}
.today-item{display:flex;align-items:center;gap:8px;padding:12px 14px;background:linear-gradient(to right,rgba(55,65,81,0.5),rgba(37,99,135,0.4),rgba(55,65,81,0.5));border:1px solid rgba(56,130,176,0.3);border-radius:12px}
.today-item .complete-btn{width:30px;height:30px;border-radius:50%;border:2px solid #6b8cae;background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.today-item .complete-btn svg{width:12px;height:12px;stroke:#6b8cae;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.today-item .complete-btn:active{border-color:#60a5fa;background:rgba(96,165,250,0.1)}
.today-item .complete-btn:active svg{stroke:#60a5fa}
.today-item .num{font-size:13px;font-weight:700;color:#7cb8d9;width:18px;text-align:center;flex-shrink:0}
.today-item .info{flex:1;min-width:0}
.today-item .info .title{font-size:14px;color:#f1f5f9;word-break:break-word;line-height:1.4}
.today-item .info .due{font-size:11px;color:#8ba4b8;margin-top:2px}
.today-item .remove{width:28px;height:28px;border:none;background:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.today-item .remove svg{width:14px;height:14px;stroke:#6b8cae;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.today-item .remove:active svg{stroke:#f87171}
.task{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(31,41,55,0.7);border:1px solid rgba(55,65,81,0.6);border-radius:12px}
.task .complete-btn{width:34px;height:34px;border-radius:50%;border:2px solid #4b5563;background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.task .complete-btn svg{width:14px;height:14px;stroke:#4b5563;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.task .complete-btn:active{border-color:#60a5fa;background:rgba(96,165,250,0.1)}
.task .complete-btn:active svg{stroke:#60a5fa}
.task .info{flex:1;min-width:0}
.task .info .title{font-size:14px;color:#9ca3af;word-break:break-word;line-height:1.4}
.task .info .due{font-size:11px;color:#6b7280;margin-top:2px}
.task .actions{display:flex;gap:2px;flex-shrink:0}
.task .actions button{width:34px;height:34px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.task .actions button svg{width:15px;height:15px;stroke:#4b5563;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.task .actions button:active{background:rgba(55,65,81,0.5)}
.task .actions button:active svg{stroke:#60a5fa}
.task .actions .del:active svg{stroke:#f87171}
.sun-btn.active svg{stroke:#93c5fd;fill:#93c5fd}
.completed-task{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(31,41,55,0.5);border:1px solid rgba(55,65,81,0.4);border-radius:12px;opacity:0.6}
.completed-task .check{width:30px;height:30px;border-radius:50%;background:rgba(29,78,216,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.completed-task .check svg{width:12px;height:12px;stroke:#60a5fa;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.completed-task .title{flex:1;font-size:14px;color:#9ca3af;text-decoration:line-through;word-break:break-word}
.completed-task .del{width:30px;height:30px;border:none;background:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.completed-task .del svg{width:13px;height:13px;stroke:#6b8cae;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.empty{text-align:center;padding:40px 0;color:#6b7280;font-size:14px}
.memo{margin:0 -16px;padding:0 4px;height:100%;display:flex;flex-direction:column}
.memo textarea{width:100%;flex:1;height:calc(100vh - 160px);height:calc(100dvh - 160px);padding:12px;border:1px solid #374151;border-radius:10px;font-size:14px;background:#111827;color:#d1d5db;resize:none;outline:none;-webkit-appearance:none}
.memo textarea:focus{border-color:#3b82f6}
.note-card{display:flex;align-items:center;gap:8px;padding:12px 14px;background:linear-gradient(to right,rgba(55,65,81,0.5),rgba(37,99,135,0.4),rgba(55,65,81,0.5));border:1px solid rgba(56,130,176,0.3);border-radius:12px;min-height:44px}
.note-card .note-title{flex:1;font-size:14px;color:#f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;word-break:break-word;line-height:1.4}
.note-card .note-title.placeholder{color:#6b7280;font-style:italic}
.note-card .actions{display:flex;gap:2px;flex-shrink:0}
.note-card .actions button{width:34px;height:34px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.note-card .actions button svg{width:15px;height:15px;stroke:#6b8cae;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.note-card .actions button:active{background:rgba(55,65,81,0.5)}
.note-card .actions button:active svg{stroke:#60a5fa}
.note-card .actions button.del:active svg{stroke:#f87171}
.note-card .actions button:disabled{opacity:0.3;pointer-events:none}
.note-colors{display:flex;gap:6px;align-items:center;margin-left:8px}
.note-colors .color-dot{width:18px;height:18px;border-radius:50%;border:2px solid #374151;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.note-colors .color-dot.active{border-color:#60a5fa;box-shadow:0 0 0 2px rgba(96,165,250,0.4)}
.note-detail{display:flex;flex-direction:column;gap:12px;height:100%;margin:0 -16px;padding:0 4px}
.note-detail .back-btn{width:44px;height:44px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.note-detail .back-btn svg{width:18px;height:18px;stroke:#60a5fa;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.note-detail input[type=text]{width:100%;min-height:48px;padding:14px 16px;border:none;border-bottom:1px solid #e5e2d8;border-radius:0;font-size:20px;font-weight:600;background:transparent;color:#1f2937;outline:none;-webkit-appearance:none}
.note-detail input[type=text]:focus{border-color:#d4c89a;box-shadow:none}
.note-detail textarea{width:100%;flex:1;padding:14px 16px;border:none;border-radius:0;font-size:16px;background:transparent;color:#1f2937;resize:none;outline:none;min-height:200px}
.note-detail textarea:focus{border-color:transparent;box-shadow:none}
.note-add-btn{min-height:44px;width:100%;border:none;border-radius:8px;font-size:14px;font-weight:600;color:#fff;background:linear-gradient(to right,#374151,#1e3a5f,#374151);cursor:pointer;-webkit-tap-highlight-color:transparent;margin-bottom:12px}
.note-add-btn:active{opacity:0.8}
</style>
</head>
<body>
<header><h1><span class="icon"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></span>Management Tool<span style="font-size:9px;color:#6b7280;font-weight:400;margin-left:6px">v4.201</span></h1><div style="display:flex;gap:4px"><button class="fs-btn" onclick="location.reload()" aria-label="Reload"><svg viewBox="0 0 24 24"><path d="M4 4v5h5M20 20v-5h-5"/><path d="M20.49 9A9 9 0 005.64 5.64L4 4m16 16l-1.64-1.64A9 9 0 013.51 15"/></svg></button><button class="fs-btn" onclick="toggleFullscreen()" aria-label="Fullscreen"><svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg></button></div></header>
<div class="tabs">
<button id="tab-0" onclick="goTo(0)">Cal</button>
<button id="tab-1" onclick="goTo(1)">Memo</button>
<button id="tab-2" class="active" onclick="goTo(2)">Tasks</button>
<button id="tab-3" onclick="goTo(3)">Notes</button>
<button id="tab-4" onclick="goTo(4)">Lists</button>
</div>
<div class="swipe-wrapper" id="sw">
<div class="swipe-track" id="track">
<div class="panel" id="p0"></div>
<div class="panel" id="p1"></div>
<div class="panel" id="p2"></div>
<div class="panel" id="p3"></div>
<div class="panel" id="p4"></div>
</div>
</div>

<script>
// --- Storage ---
const TASKS_KEY='tm-tasks',TODAY_KEY='tm-today',MEMO_KEY='tm-memo',NOTES_KEY='tm-notes',LISTS_KEY='tm-lists',DISMISS_KEY='tm-today-dismiss',RECUR_KEY='tm-recurring';
function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(36).slice(2)}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function loadTasks(){try{return JSON.parse(localStorage.getItem(TASKS_KEY))||[]}catch{return[]}}
function saveTasks(t){localStorage.setItem(TASKS_KEY,JSON.stringify(t))}
function loadToday(){try{const d=JSON.parse(localStorage.getItem(TODAY_KEY));if(d&&d.ids)return d.ids;return[]}catch{return[]}}
function saveToday(ids){localStorage.setItem(TODAY_KEY,JSON.stringify({date:todayStr(),ids}))}
function loadMemo(){return localStorage.getItem(MEMO_KEY)||''}
function saveMemo(v){localStorage.setItem(MEMO_KEY,v)}
function loadNotes(){try{return JSON.parse(localStorage.getItem(NOTES_KEY))||[]}catch{return[]}}
function saveNotes(n){try{localStorage.setItem(NOTES_KEY,JSON.stringify(n))}catch(e){alert('Failed to save notes. Please check storage capacity.')}}
function loadLists(){try{return JSON.parse(localStorage.getItem(LISTS_KEY))||[]}catch{return[]}}
function saveLists(l){try{localStorage.setItem(LISTS_KEY,JSON.stringify(l))}catch(e){alert('Failed to save lists. Please check storage capacity.')}}
function loadDismissed(){try{const d=JSON.parse(localStorage.getItem(DISMISS_KEY));if(d&&d.date===todayStr())return d.ids||[];return[]}catch{return[]}}
function saveDismissed(ids){localStorage.setItem(DISMISS_KEY,JSON.stringify({date:todayStr(),ids}))}
function loadRecurring(){try{return JSON.parse(localStorage.getItem(RECUR_KEY))||[]}catch{return[]}}
function saveRecurring(r){localStorage.setItem(RECUR_KEY,JSON.stringify(r))}

let tasks=loadTasks();
const cutoff=new Date(Date.now()-14*24*60*60*1000).toISOString();
tasks=tasks.filter(t=>t.status!=='completed'||!t.completedAt||t.completedAt>cutoff);
saveTasks(tasks);
let todayIds=loadToday();
const td=todayStr();
tasks.forEach(t=>{
  if(t.status==='active'&&t.dueDate&&t.dueDate<=td&&!todayIds.includes(t.id)){
    if(t.dueDate<td){todayIds.unshift(t.id)}else{todayIds.push(t.id)}
  }
});
saveToday(todayIds);

let notes=loadNotes();
let noteView='list';
let currentNoteId=null;
let noteListScrollTop=0;

let lists=loadLists();
let listView='list';
let currentListId=null;
let listListScrollTop=0;
let dismissedIds=loadDismissed();
let recurring=loadRecurring();

// --- Swipe ---
let cur=2;
let prevTab=2;
const track=document.getElementById('track');

function getVw(){return window.innerWidth}

function setPos(x,animate){
  if(animate){track.classList.add('animating')}else{track.classList.remove('animating')}
  track.style.transform='translateX('+x+'px)';
}
function snapTo(i){
  cur=i;
  setPos(-i*getVw(),true);
  for(let j=0;j<5;j++)document.getElementById('tab-'+j).className=j===i?'active':'';
  // ⑤ Blur active input on tab change
  if(document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA')){document.activeElement.blur()}
}
function goTo(i){prevTab=cur;snapTo(i)}

// Touch handling
let sx=0,sy=0,dx=0,moving=false,startT=0,swipeInCalArea=false;
const sw=document.getElementById('sw');

sw.addEventListener('touchstart',function(e){
  sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;moving=false;startT=Date.now();
  // Check if touch started inside cal-area
  const calArea=document.getElementById('cal-area');
  swipeInCalArea=calArea&&calArea.contains(e.target);
  track.classList.remove('animating');
},{passive:true});

sw.addEventListener('touchmove',function(e){
  const cx=e.touches[0].clientX,cy=e.touches[0].clientY;
  dx=cx-sx;
  const dy=cy-sy;
  if(!moving){
    if(Math.abs(dy)>Math.abs(dx))return; // vertical scroll
    moving=true;
  }
  if(moving){
    // If swiping in cal-area on calendar tab, don't move panels (month nav handles it)
    if(cur===0&&swipeInCalArea)return;
    // Prevent Chrome back/forward gesture when in detail view
    if((cur===3&&noteView==='detail')||(cur===4&&listView==='detail')){
      e.preventDefault();
    }
    const base=-cur*getVw();
    // Resistance at edges
    let offset=dx;
    if((cur===0&&dx>0)||(cur===4&&dx<0))offset=dx*0.3;
    setPos(base+offset,false);
  }
},{passive:false});

sw.addEventListener('touchend',function(e){
  if(!moving){return}
  moving=false;
  // If swipe was in cal-area, don't switch tabs (month nav handles it)
  if(cur===0&&swipeInCalArea){snapTo(cur);return}
  const elapsed=Date.now()-startT;
  const velocity=Math.abs(dx)/elapsed;
  const threshold=getVw()*0.25;
  const isSwipeRight=dx>threshold||(dx>30&&velocity>0.3);
  const isSwipeLeft=dx<-threshold||(dx<-30&&velocity>0.3);

  // If in detail view on Notes or Lists, swipe right goes back to list first
  if(isSwipeRight){
    if(cur===3&&noteView==='detail'){animateBackToList('note');snapTo(cur);return}
    if(cur===4&&listView==='detail'){animateBackToList('list');snapTo(cur);return}
    // ⑥ Swipe back returns to previous tab if different from cur-1
    if(cur>0){const target=(prevTab<cur)?prevTab:cur-1;prevTab=cur;snapTo(target)}else{snapTo(cur)}
  }else if(isSwipeLeft){
    if(cur<4){prevTab=cur;snapTo(cur+1)}else{snapTo(cur)}
  }else{
    snapTo(cur);
  }
},{passive:true});

// After animation ends
track.addEventListener('transitionend',function(){track.classList.remove('animating')});

// --- Render ---
function render(panels){
  if(!panels||panels==='all'){
    renderCalendar(document.getElementById('p0'));
    renderMemo(document.getElementById('p1'));
    renderTasks(document.getElementById('p2'));
    renderNotes(document.getElementById('p3'));
    renderLists(document.getElementById('p4'));
  }else{
    if(panels.includes('cal'))renderCalendar(document.getElementById('p0'));
    if(panels.includes('memo'))renderMemo(document.getElementById('p1'));
    if(panels.includes('tasks'))renderTasks(document.getElementById('p2'));
    if(panels.includes('notes'))renderNotes(document.getElementById('p3'));
    if(panels.includes('lists'))renderLists(document.getElementById('p4'));
  }
  setTimeout(initTodayDrag,0);
}

function renderTasks(el){
  const active=tasks.filter(t=>t.status==='active');
  const oneMonth=new Date();oneMonth.setMonth(oneMonth.getMonth()+1);
  const ms=oneMonth.getFullYear()+'-'+String(oneMonth.getMonth()+1).padStart(2,'0')+'-'+String(oneMonth.getDate()).padStart(2,'0');
  const upcoming=active.filter(t=>!t.dueDate||t.dueDate<=ms);
  const longterm=active.filter(t=>t.dueDate&&t.dueDate>ms);
  // Also include notes/lists due today or overdue (excluding dismissed ones)
  const todayNotes=notes.filter(n=>n.status!=='completed'&&n.dueDate&&n.dueDate<=todayStr()&&!dismissedIds.includes(n.id));
  const todayLists=lists.filter(l=>l.status!=='completed'&&l.dueDate&&l.dueDate<=todayStr()&&!dismissedIds.includes(l.id));
  // Build allTodayItems respecting todayIds order for ALL item types
  const allTodayItems=[];
  const addedIds=new Set();
  // Recurring items due today
  const todayRecurring=recurring.filter(r=>{const nd=getNextRecurringDate(r);return nd===todayStr()&&!dismissedIds.includes(r.id)});
  // First: items explicitly in todayIds (in saved order)
  todayIds.forEach(id=>{
    const t=active.find(x=>x.id===id);
    if(t){allTodayItems.push({...t,_type:'task'});addedIds.add(id);return}
    const n=notes.find(x=>x.id===id&&x.status!=='completed');
    if(n&&!dismissedIds.includes(id)){allTodayItems.push({...n,_type:'note'});addedIds.add(id);return}
    const l=lists.find(x=>x.id===id&&x.status!=='completed');
    if(l&&!dismissedIds.includes(id)){allTodayItems.push({...l,_type:'list'});addedIds.add(id);return}
    const r=todayRecurring.find(x=>x.id===id);
    if(r){allTodayItems.push({...r,dueDate:todayStr(),_type:'recurring',repeat:r.repeat,days:r.days});addedIds.add(id);return}
  });
  // Then: auto-added notes/lists (due today/overdue) not yet in todayIds
  todayNotes.forEach(n=>{if(!addedIds.has(n.id)){allTodayItems.push({...n,_type:'note'});addedIds.add(n.id)}});
  todayLists.forEach(l=>{if(!addedIds.has(l.id)){allTodayItems.push({...l,_type:'list'});addedIds.add(l.id)}});
  // Auto-add recurring due today not yet in todayIds
  todayRecurring.forEach(r=>{if(!addedIds.has(r.id)){allTodayItems.push({...r,dueDate:todayStr(),_type:'recurring',repeat:r.repeat,days:r.days});addedIds.add(r.id)}});
  let html='';

function taskCard(t){
  const isT=todayIds.includes(t.id);
  const overdue=t.dueDate&&t.dueDate<todayStr();
  const titleColor=overdue?'#f87171':'#9ca3af';
  const skdlLabel=t.source==='schedule'?`<div style="font-size:10px;color:#a78bfa;font-weight:700;margin-bottom:2px">SKDL</div>`:`<div style="font-size:10px;color:#60a5fa;font-weight:700;margin-bottom:2px">TASK</div>`;
  const bellColor=t.reminder?'#fbbf24':'#4b5563';
  return `<div class="task"><button class="complete-btn" onclick="completeTask('${t.id}')"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></button><div class="info">${skdlLabel}<div class="title" style="color:${titleColor}">${esc(t.title)}</div>${t.dueDate?`<div class="due" style="${overdue?'color:#f87171':''}">${overdue?'⚠ ':''}${t.reminder?'🔔'+t.reminder+' ':''}Due: ${t.dueDate}</div>`:''}</div><div class="actions"><button onclick="showReminderSetting('${t.id}','task')" title="Reminder"><svg viewBox="0 0 24 24" style="stroke:${bellColor}"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg></button><button class="sun-btn${isT?' active':''}" onclick="toggleToday('${t.id}')"><svg viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg></button><button onclick="editTask('${t.id}')"><svg viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button><button class="del" onclick="deleteTask('${t.id}')"><svg viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button></div></div>`;

  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];

  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=todayStr();

  // Tasks with due dates this month
  const activeTasks=tasks.filter(t=>t.status==='active'&&t.dueDate);
  const completedSchedTasks=tasks.filter(t=>t.status==='completed'&&t.dueDate);
  const monthStr=calYear+'-'+String(calMonth+1).padStart(2,'0');
  const selDay=window._calSelectedDay||today;

  let html='';
  html+=`<div class="section-title" style="justify-content:space-between"><span style="display:flex;align-items:center;gap:8px"><span class="badge"><svg viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></span>Calendar</span><button onclick="addSchedule()" class="btn" style="width:auto;padding:0 12px;min-height:32px;font-size:12px">+ Add Schedule</button></div>`;
  // Calendar area (swipeable for month nav)
  html+=`<div id="cal-area">`;

  // Day names row
  html+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:8px">`;
  dayNames.forEach((d,i)=>{
    const color=i===0?'#f87171':i===6?'#60a5fa':'#9ca3af';

  // Calendar grid
  html+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">`;
  // Empty cells before first day
  for(let i=0;i<firstDay;i++)html+=`<div></div>`;
  // Pre-build date lookup sets for O(1) per-day checks
  const noteDates=new Set();notes.forEach(n=>{if(n.status!=='completed'&&n.dueDate)noteDates.add(n.dueDate)});
  const listDates=new Set();lists.forEach(l=>{if(l.status!=='completed'&&l.dueDate)listDates.add(l.dueDate)});
  const taskDates={};const schedDates={};
  activeTasks.forEach(t=>{if(t.source==='schedule')schedDates[t.dueDate]=true;else taskDates[t.dueDate]=true;});
  completedSchedTasks.forEach(t=>{if(t.source==='schedule')schedDates[t.dueDate]=true;else taskDates[t.dueDate]=true;});
  // Days
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dayOfWeek=(firstDay+d-1)%7;
    const isToday=dateStr===today;

    let dots='';
    const dotStyle='width:4px;height:4px;border-radius:50%;';
    if(taskDates[dateStr])dots+=`<span style="${dotStyle}background:#60a5fa"></span>`;

    if(!schedDates[dateStr]&&recurring.some(r=>isRecurringOnDate(r,dateStr)))dots+=`<span style="${dotStyle}background:#a78bfa"></span>`;

  }
  html+=`</div>`;
  html+=`</div>`; // close cal-area

  // Show items for selected day
  const dayTasks=activeTasks.filter(t=>t.dueDate===selDay);
  const completedDayTasks=tasks.filter(t=>t.status==='completed'&&t.dueDate===selDay);
  const dayNotes=notes.filter(n=>n.status!=='completed'&&n.dueDate===selDay);

  const dayRecurring=getRecurringOnDate(selDay);
  const totalDay=dayTasks.length+completedDayTasks.length+dayNotes.length+dayLists.length+dayRecurring.length;
  if(totalDay>0){
    html+=`<div style="margin-top:16px"><div class="section-title"><span class="badge"><svg viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></span>${selDay} <span class="count">${totalDay}</span></div><div style="display:flex;flex-direction:column;gap:6px">`;
    dayTasks.forEach(t=>{
      const overdue=t.dueDate<today;
      const titleColor=overdue?'#f87171':'#f1f5f9';
      const label=t.source==='schedule'?'<span style="font-size:10px;color:#a78bfa;font-weight:700;background:rgba(167,139,250,0.1);padding:2px 6px;border-radius:4px">SKDL</span>':'<span style="font-size:10px;color:#60a5fa;font-weight:700;background:rgba(96,165,250,0.1);padding:2px 6px;border-radius:4px">TASK</span>';
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(31,41,55,0.7);border:1px solid rgba(55,65,81,0.6);border-radius:10px"><button onclick="completeTask('${t.id}')" style="width:28px;height:28px;border-radius:50%;border:2px solid #4b5563;background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:#4b5563;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><path d="M5 13l4 4L19 7"/></svg></button>${label}<span style="flex:1;font-size:13px;color:${titleColor}">${esc(t.title)}</span><button onclick="deleteTask('${t.id}')" style="width:28px;height:28px;border:none;background:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#6b7280;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M6 18L18 6M6 6l12 12"/></svg></button></div>`;
    });
    completedDayTasks.forEach(t=>{
      const lbl=t.source==='schedule'?'SKDL':'TASK';
      const lblColor=t.source==='schedule'?'#a78bfa':'#60a5fa';
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(31,41,55,0.5);border:1px solid rgba(55,65,81,0.4);border-radius:10px;opacity:0.6"><span style="font-size:10px;color:${lblColor};font-weight:700;background:rgba(${t.source==='schedule'?'167,139,250':'96,165,250'},0.1);padding:2px 6px;border-radius:4px">${lbl} ✓</span><span style="flex:1;font-size:13px;color:#9ca3af;text-decoration:line-through">${esc(t.title)}</span><button onclick="uncompleteTask('${t.id}')" style="width:28px;height:28px;border:none;background:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0" title="Restore"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#6b8cae;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M3 10h10a5 5 0 015 5v2M3 10l4-4M3 10l4 4"/></svg></button></div>`;
    });
    dayRecurring.forEach(r=>{
      const repLabel=r.repeat==='weekly'?'毎週':r.repeat==='biweekly'?'2週間':r.repeat==='monthly'?'毎月':r.repeat==='yearly'?'毎年':r.days+'日毎';
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(31,41,55,0.7);border:1px solid rgba(55,65,81,0.6);border-radius:10px"><button onclick="completeRecurring('${r.id}')" style="width:28px;height:28px;border-radius:50%;border:2px solid #4b5563;background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:#4b5563;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><path d="M5 13l4 4L19 7"/></svg></button><span style="font-size:10px;color:#a78bfa;font-weight:700;background:rgba(167,139,250,0.1);padding:2px 6px;border-radius:4px">🔁 ${repLabel}</span><span style="flex:1;font-size:13px;color:#f1f5f9">${esc(r.title)}</span><button onclick="deleteRecurring('${r.id}','${selDay}')" style="width:28px;height:28px;border:none;background:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#6b7280;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M6 18L18 6M6 6l12 12"/></svg></button></div>`;
    });
    dayNotes.forEach(n=>{
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(31,41,55,0.7);border:1px solid rgba(55,65,81,0.6);border-radius:10px;cursor:pointer"><button onclick="event.stopPropagation();completeNote('${n.id}')" style="width:28px;height:28px;border-radius:50%;border:2px solid #4b5563;background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:#4b5563;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><path d="M5 13l4 4L19 7"/></svg></button><span style="font-size:11px;color:#4ade80;font-weight:600">NOTE</span><span onclick="goTo(3);setTimeout(()=>openNote('${n.id}'),100)" style="flex:1;font-size:13px;color:#f1f5f9;cursor:pointer">${esc(n.title||'Untitled')}</span><button onclick="deleteNote('${n.id}')" style="width:28px;height:28px;border:none;background:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#6b7280;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M6 18L18 6M6 6l12 12"/></svg></button></div>`;
    });
    dayLists.forEach(l=>{
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(31,41,55,0.7);border:1px solid rgba(55,65,81,0.6);border-radius:10px;cursor:pointer"><button onclick="event.stopPropagation();completeList('${l.id}')" style="width:28px;height:28px;border-radius:50%;border:2px solid #4b5563;background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:#4b5563;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><path d="M5 13l4 4L19 7"/></svg></button><span style="font-size:11px;color:#fbbf24;font-weight:600">LIST</span><span onclick="goTo(4);setTimeout(()=>openList('${l.id}'),100)" style="flex:1;font-size:13px;color:#f1f5f9;cursor:pointer">${esc(l.title||'Untitled')}</span><button onclick="deleteList('${l.id}')" style="width:28px;height:28px;border:none;background:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#6b7280;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M6 18L18 6M6 6l12 12"/></svg></button></div>`;
    });
    html+=`</div></div>`;
  }

  el.innerHTML=html;
  setTimeout(initCalSwipe,0);
}

function calPrev(){window._calMonth--;if(window._calMonth<0){window._calMonth=11;window._calYear--;}renderCalendar(document.getElementById('p0'))}
function calNext(){window._calMonth++;if(window._calMonth>11){window._calMonth=0;window._calYear++;}renderCalendar(document.getElementById('p0'))}
function calShowDay(dateStr){
  const now=Date.now();
  if(window._calLastTapDay===dateStr&&now-window._calLastTapTime<3000){
    // Double tap within 3 seconds - open add schedule
    window._calSelectedDay=dateStr;
    renderCalendar(document.getElementById('p0'));
    addSchedule();
    window._calLastTapDay=null;
    return;
  }
  window._calLastTapDay=dateStr;
  window._calLastTapTime=now;
  window._calSelectedDay=dateStr;
  renderCalendar(document.getElementById('p0'));
}

function isRecurringOnDate(rec,dateStr){
  if(dateStr<rec.startDate)return false;
  if(dateStr===rec.startDate)return true;
  const start=new Date(rec.startDate+'T00:00:00');
  const target=new Date(dateStr+'T00:00:00');
  const diffMs=target-start;
  const diffDays=Math.round(diffMs/(1000*60*60*24));
  if(rec.repeat==='weekly')return diffDays%7===0;
  if(rec.repeat==='biweekly')return diffDays%14===0;
  if(rec.repeat==='custom')return diffDays%(rec.days||1)===0;
  if(rec.repeat==='monthly'){return start.getDate()===target.getDate()}
  if(rec.repeat==='yearly'){return start.getMonth()===target.getMonth()&&start.getDate()===target.getDate()}
  return false;
}
function getRecurringOnDate(dateStr){return recurring.filter(r=>isRecurringOnDate(r,dateStr))}
function deleteRecurring(id,dateStr){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:16px';
  overlay.innerHTML=`<div style="background:#1f2937;border:1px solid #374151;border-radius:12px;padding:20px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px">
    <div style="font-size:14px;font-weight:600;color:#f1f5f9">スケジュールの削除</div>
    <div style="font-size:13px;color:#9ca3af">この繰り返しスケジュールをどう削除しますか？</div>
    <button id="del-rec-one" style="min-height:44px;border:1px solid #374151;border-radius:8px;background:none;color:#f3f4f6;font-size:14px;cursor:pointer;padding:0 16px;text-align:left">この日だけ削除</button>
    <button id="del-rec-all" style="min-height:44px;border:1px solid #f87171;border-radius:8px;background:rgba(248,113,113,0.1);color:#f87171;font-size:14px;font-weight:600;cursor:pointer;padding:0 16px;text-align:left">すべての繰り返しを削除</button>
    <button id="del-rec-cancel" style="min-height:40px;border:1px solid #374151;border-radius:8px;background:none;color:#6b7280;font-size:14px;cursor:pointer;padding:0 16px">キャンセル</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',function(e){if(e.target===overlay){document.body.removeChild(overlay)}});
  document.getElementById('del-rec-cancel').addEventListener('click',function(){document.body.removeChild(overlay)});
  document.getElementById('del-rec-one').addEventListener('click',function(){
    // Add this date to completedDates (effectively skip it)
    const rec=recurring.find(r=>r.id===id);
    if(rec){
      if(!rec.completedDates)rec.completedDates=[];
      const targetDate=dateStr||getNextRecurringDate(rec);
      rec.completedDates.push(targetDate);
      recurring=recurring.map(r=>r.id===id?rec:r);
      saveRecurring(recurring);
    }
    document.body.removeChild(overlay);
    render(['tasks','cal']);
  });
  document.getElementById('del-rec-all').addEventListener('click',function(){
    recurring=recurring.filter(r=>r.id!==id);
    saveRecurring(recurring);
    todayIds=todayIds.filter(i=>i!==id);
    saveToday(todayIds);
    document.body.removeChild(overlay);
    render(['tasks','cal']);
  });
}
function getNextRecurringDate(rec){
  const today=todayStr();
  const completed=rec.completedDates||[];
  const start=new Date(rec.startDate+'T00:00:00');
  const now=new Date(today+'T00:00:00');
  // Find next occurrence >= today that's not completed
  let candidate;
  if(rec.repeat==='weekly'||rec.repeat==='biweekly'||rec.repeat==='custom'){
    const interval=rec.repeat==='weekly'?7:rec.repeat==='biweekly'?14:(rec.days||1);
    let diff=Math.floor((now-start)/(interval*86400000));
    if(diff<0)diff=0;
    for(let i=diff;i<diff+60;i++){
      const d=new Date(start.getTime()+i*interval*86400000);
      const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(ds>=today&&!completed.includes(ds))return ds;
    }
  }else if(rec.repeat==='monthly'){
    const day=start.getDate();
    let y=now.getFullYear(),m=now.getMonth();
    for(let i=0;i<24;i++){
      candidate=new Date(y,m+i,day);
      const ds=candidate.getFullYear()+'-'+String(candidate.getMonth()+1).padStart(2,'0')+'-'+String(candidate.getDate()).padStart(2,'0');
      if(ds>=today&&!completed.includes(ds))return ds;
    }
  }else if(rec.repeat==='yearly'){
    let y=now.getFullYear();
    for(let i=0;i<10;i++){
      candidate=new Date(y+i,start.getMonth(),start.getDate());
      const ds=candidate.getFullYear()+'-'+String(candidate.getMonth()+1).padStart(2,'0')+'-'+String(candidate.getDate()).padStart(2,'0');
      if(ds>=today&&!completed.includes(ds))return ds;
    }
  }
  return today;
}

function completeRecurring(id){
  const rec=recurring.find(r=>r.id===id);
  if(!rec)return;
  const nextDate=getNextRecurringDate(rec);
  if(!rec.completedDates)rec.completedDates=[];
  rec.completedDates.push(nextDate);
  // Keep only last 30 completed dates to avoid bloat
  if(rec.completedDates.length>30)rec.completedDates=rec.completedDates.slice(-30);
  recurring=recurring.map(r=>r.id===id?rec:r);
  saveRecurring(recurring);
  // Remove from todayIds so next occurrence can appear fresh
  todayIds=todayIds.filter(i=>i!==id);
  saveToday(todayIds);
  // Add to completed tasks list for display
  const task={id:uid(),title:rec.title,dueDate:nextDate,status:'completed',source:'schedule',createdAt:rec.createdAt,completedAt:new Date().toISOString()};
  tasks.push(task);saveTasks(tasks);
  render(['tasks']);
}

    if(!title)return;
    const dueDate=document.getElementById('sched-date').value||selDay;
    const dueTime=document.getElementById('sched-time').value||null;
    const addToToday=document.getElementById('sched-today').checked;
    const repeatType=document.getElementById('sched-repeat').value;
    if(repeatType!=='none'){
      const rec={id:uid(),title:title,startDate:dueDate,repeat:repeatType,reminder:dueTime||null,createdAt:new Date().toISOString()};
      if(repeatType==='custom'){rec.days=parseInt(document.getElementById('sched-days').value)||3}
      recurring.push(rec);

      if(addToToday&&dueDate<=todayStr()){todayIds.push(rec.id);saveToday(todayIds)}
    }else{
      const task={id:uid(),title:title,dueDate:dueDate,dueTime:dueTime,reminder:dueTime||null,status:'active',source:'schedule',createdAt:new Date().toISOString(),completedAt:null};
      tasks.unshift(task);saveTasks(tasks);

    }
    document.body.removeChild(overlay);
    render(['tasks','cal']);
  });

// Calendar swipe for month navigation
let calSx=0,calMoving=false,calDx=0;
function initCalSwipe(){
  const calEl=document.getElementById('cal-area');
  if(!calEl)return;
  calEl.style.transition='none';
  calEl.addEventListener('touchstart',function(e){calSx=e.touches[0].clientX;calMoving=false;calDx=0;calEl.style.transition='none';calEl.style.transform='translateX(0)';calEl.style.opacity='1'},{passive:true});
  calEl.addEventListener('touchmove',function(e){
    calDx=e.touches[0].clientX-calSx;
    if(Math.abs(calDx)>15)calMoving=true;
    if(calMoving){
      const offset=calDx*0.4;
      const opacity=1-Math.abs(calDx)/400;
      calEl.style.transform='translateX('+offset+'px)';
      calEl.style.opacity=Math.max(opacity,0.3);
    }
  },{passive:true});
  calEl.addEventListener('touchend',function(e){
    if(!calMoving){calEl.style.transform='';calEl.style.opacity='';return}
    const cdx=e.changedTouches[0].clientX-calSx;
    if(Math.abs(cdx)>50){
      const dir=cdx>0?1:-1;
      calEl.style.transition='transform 0.2s ease-out, opacity 0.2s ease-out';
      calEl.style.transform='translateX('+(dir*120)+'px)';
      calEl.style.opacity='0';
      setTimeout(()=>{
        if(cdx>50)calPrev();else calNext();
        // After re-render, animate in from opposite side
        setTimeout(()=>{
          const newEl=document.getElementById('cal-area');
          if(newEl){
            newEl.style.transition='none';
            newEl.style.transform='translateX('+(-dir*80)+'px)';
            newEl.style.opacity='0';
            setTimeout(()=>{
              newEl.style.transition='transform 0.25s ease-out, opacity 0.25s ease-out';
              newEl.style.transform='translateX(0)';
              newEl.style.opacity='1';
            },20);
          }
        },20);
      },200);
    }else{
      calEl.style.transition='transform 0.2s ease-out, opacity 0.2s ease-out';
      calEl.style.transform='translateX(0)';
      calEl.style.opacity='1';
    }
    calMoving=false;
  },{passive:true});
}

function moveNoteUp(id){
  const sorted=notes.slice().sort((a,b)=>a.order-b.order);
  const idx=sorted.findIndex(n=>n.id===id);
  if(idx<=0)return;
  const prev=sorted[idx-1];
  const curr=sorted[idx];
  const tempOrder=curr.order;
  notes=notes.map(n=>{
    if(n.id===curr.id)return{...n,order:prev.order};
    if(n.id===prev.id)return{...n,order:tempOrder};
    return n;
  });
  saveNotes(notes);
  renderNotes(document.getElementById('p3'));
}

function moveNoteDown(id){
  const sorted=notes.slice().sort((a,b)=>a.order-b.order);
  const idx=sorted.findIndex(n=>n.id===id);
  if(idx<0||idx>=sorted.length-1)return;
  const next=sorted[idx+1];
  const curr=sorted[idx];
  const tempOrder=curr.order;
  notes=notes.map(n=>{
    if(n.id===curr.id)return{...n,order:next.order};
    if(n.id===next.id)return{...n,order:tempOrder};
    return n;
  });
  saveNotes(notes);
  renderNotes(document.getElementById('p3'));
}

// --- Long-press drag reorder for Lists ---
let listDragEl=null,listDragStartY=0,listIsDragging=false,listLongPressTimer=null;

function initListDrag(){
  const list=document.getElementById('list-list');
  if(!list)return;
  const items=list.querySelectorAll('.note-card');
  items.forEach(item=>{
    item.addEventListener('touchstart',onListDragStart,{passive:false});
  });
}

function onListDragStart(e){
  const item=e.currentTarget;
  listDragStartY=e.touches[0].clientY;
  listLongPressTimer=setTimeout(()=>{
    listIsDragging=true;
    listDragEl=item;
    item.style.opacity='0.7';
    item.style.zIndex='1000';
    item.style.boxShadow='0 4px 20px rgba(0,0,0,0.5)';
    item.style.transition='none';
    document.addEventListener('touchmove',onListDragMove,{passive:false});
    document.addEventListener('touchend',onListDragEnd,{passive:false});
  },400);
  const cancelCheck=(ev)=>{
    if(Math.abs(ev.touches[0].clientY-listDragStartY)>10){
      clearTimeout(listLongPressTimer);
      document.removeEventListener('touchmove',cancelCheck);
    }
  };
  document.addEventListener('touchmove',cancelCheck,{passive:true});
  item.addEventListener('touchend',()=>{
    clearTimeout(listLongPressTimer);
    document.removeEventListener('touchmove',cancelCheck);
  },{once:true});
}

function onListDragMove(e){
  if(!listIsDragging||!listDragEl)return;
  e.preventDefault();
  const y=e.touches[0].clientY;
  const dy=y-listDragStartY;
  listDragEl.style.transform='translateY('+dy+'px)';
  const container=document.getElementById('list-list');
  const items=[...container.querySelectorAll('.note-card')];
  const dragIdx=items.indexOf(listDragEl);
  const dragRect=listDragEl.getBoundingClientRect();
  const dragCenter=dragRect.top+dragRect.height/2;
  for(let i=0;i<items.length;i++){
    if(i===dragIdx)continue;
    const rect=items[i].getBoundingClientRect();
    const center=rect.top+rect.height/2;
    if(dragIdx<i&&dragCenter>center){
      container.insertBefore(listDragEl,items[i].nextSibling);
      listDragStartY=y;
      listDragEl.style.transform='translateY(0)';
      break;
    }else if(dragIdx>i&&dragCenter<center){
      container.insertBefore(listDragEl,items[i]);
      listDragStartY=y;
      listDragEl.style.transform='translateY(0)';
      break;
    }
  }
}

function onListDragEnd(){
  if(!listIsDragging)return;
  listIsDragging=false;
  document.removeEventListener('touchmove',onListDragMove);
  document.removeEventListener('touchend',onListDragEnd);
  if(listDragEl){
    listDragEl.style.opacity='';
    listDragEl.style.zIndex='';
    listDragEl.style.boxShadow='';

// --- Long-press drag reorder for Notes ---
let noteDragEl=null,noteDragStartY=0,noteIsDragging=false,noteLongPressTimer=null;

function initNoteDrag(){
  const list=document.getElementById('note-list');
  if(!list)return;
  const items=list.querySelectorAll('.note-card');
  items.forEach(item=>{
    item.addEventListener('touchstart',onNoteDragStart,{passive:false});
  });
}

function onNoteDragStart(e){
  const item=e.currentTarget;
  noteDragStartY=e.touches[0].clientY;
  noteLongPressTimer=setTimeout(()=>{
    noteIsDragging=true;
    noteDragEl=item;
    item.style.opacity='0.7';
    item.style.zIndex='1000';
    item.style.boxShadow='0 4px 20px rgba(0,0,0,0.5)';
    item.style.transition='none';
    document.addEventListener('touchmove',onNoteDragMove,{passive:false});
    document.addEventListener('touchend',onNoteDragEnd,{passive:false});
  },400);
  const cancelCheck=(ev)=>{
    if(Math.abs(ev.touches[0].clientY-noteDragStartY)>10){
      clearTimeout(noteLongPressTimer);
      document.removeEventListener('touchmove',cancelCheck);
    }
  };
  document.addEventListener('touchmove',cancelCheck,{passive:true});
  item.addEventListener('touchend',()=>{
    clearTimeout(noteLongPressTimer);
    document.removeEventListener('touchmove',cancelCheck);
  },{once:true});
}

function onNoteDragMove(e){
  if(!noteIsDragging||!noteDragEl)return;
  e.preventDefault();
  const y=e.touches[0].clientY;
  const dy=y-noteDragStartY;
  noteDragEl.style.transform='translateY('+dy+'px)';
  const list=document.getElementById('note-list');
  const items=[...list.querySelectorAll('.note-card')];
  const dragIdx=items.indexOf(noteDragEl);
  const dragRect=noteDragEl.getBoundingClientRect();
  const dragCenter=dragRect.top+dragRect.height/2;
  for(let i=0;i<items.length;i++){
    if(i===dragIdx)continue;
    const rect=items[i].getBoundingClientRect();
    const center=rect.top+rect.height/2;
    if(dragIdx<i&&dragCenter>center){
      list.insertBefore(noteDragEl,items[i].nextSibling);
      noteDragStartY=y;
      noteDragEl.style.transform='translateY(0)';
      break;
    }else if(dragIdx>i&&dragCenter<center){
      list.insertBefore(noteDragEl,items[i]);
      noteDragStartY=y;
      noteDragEl.style.transform='translateY(0)';
      break;
    }
  }
}

function onNoteDragEnd(){
  if(!noteIsDragging)return;
  noteIsDragging=false;
  document.removeEventListener('touchmove',onNoteDragMove);
  document.removeEventListener('touchend',onNoteDragEnd);
  if(noteDragEl){
    noteDragEl.style.opacity='';
    noteDragEl.style.zIndex='';
    noteDragEl.style.boxShadow='';
    noteDragEl.style.transform='';
    noteDragEl.style.transition='';
  }
  const list=document.getElementById('note-list');
  if(list){
    const newIds=[...list.querySelectorAll('.note-card')].map(el=>el.getAttribute('data-id'));
    newIds.forEach((id,i)=>{
      notes=notes.map(n=>n.id===id?{...n,order:i}:n);
    });
    saveNotes(notes);
    renderNotes(document.getElementById('p3'));
  }
  noteDragEl=null;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function toggleFullscreen(){
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    const el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  }else{
    if(document.exitFullscreen)document.exitFullscreen();
    else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
  }
}

function animateBackToList(type){
  const panelId=type==='note'?'p3':'p4';
  const panel=document.getElementById(panelId);
  const detail=panel.querySelector('.note-detail');
  if(!detail)return;
  detail.style.transition='transform 0.25s ease-in, opacity 0.25s ease-in';
  detail.style.transform='scale(0.85) translateX(60px)';
  detail.style.opacity='0';
  setTimeout(()=>{
    if(type==='note')backToList();
    else backToListList();
  },250);
}

// --- Long-press drag reorder for Today's Focus ---
let dragEl=null,dragId=null,dragStartY=0,dragOffsetY=0,longPressTimer=null,isDragging=false;

function initTodayDrag(){
  const list=document.getElementById('today-list');
  if(!list)return;
  const items=list.querySelectorAll('.today-item');
  items.forEach(item=>{
    item.addEventListener('touchstart',onDragTouchStart,{passive:false});

}

function onDragTouchStart(e){
  const item=e.currentTarget;
  dragId=item.getAttribute('data-id');
  dragStartY=e.touches[0].clientY;
  longPressTimer=setTimeout(()=>{
    isDragging=true;
    dragEl=item;
    // Prevent click from firing after drag
    item.setAttribute('data-dragging','true');
    item.style.opacity='0.7';
    item.style.zIndex='1000';
    item.style.boxShadow='0 4px 20px rgba(0,0,0,0.5)';
    item.style.transition='none';
    // Prevent panel scrolling during drag
    document.getElementById('p2').style.overflowY='hidden';
    // Vibrate for tactile feedback if available
    if(navigator.vibrate)navigator.vibrate(30);
    document.addEventListener('touchmove',onDragTouchMove,{passive:false});
    document.addEventListener('touchend',onDragTouchEnd,{passive:false});
  },400);
  // Cancel long press if finger moves too much
  const cancelCheck=(ev)=>{
    if(Math.abs(ev.touches[0].clientY-dragStartY)>10){
      clearTimeout(longPressTimer);
      document.removeEventListener('touchmove',cancelCheck);
    }
  };
  document.addEventListener('touchmove',cancelCheck,{passive:true});
  item.addEventListener('touchend',()=>{
    clearTimeout(longPressTimer);
    document.removeEventListener('touchmove',cancelCheck);
  },{once:true});
}

function onDragTouchMove(e){
  if(!isDragging||!dragEl)return;
  e.preventDefault();
  e.stopPropagation();
  const y=e.touches[0].clientY;
  const dy=y-dragStartY;
  dragEl.style.transform='translateY('+dy+'px)';

  // Find swap target
  const list=document.getElementById('today-list');
  const items=[...list.querySelectorAll('.today-item')];
  const dragIdx=items.indexOf(dragEl);
  const dragRect=dragEl.getBoundingClientRect();
  const dragCenter=dragRect.top+dragRect.height/2;

  for(let i=0;i<items.length;i++){
    if(i===dragIdx)continue;
    const rect=items[i].getBoundingClientRect();
    const center=rect.top+rect.height/2;
    if(dragIdx<i&&dragCenter>center){
      list.insertBefore(dragEl,items[i].nextSibling);
      dragStartY=y;
      dragEl.style.transform='translateY(0)';
      break;
    }else if(dragIdx>i&&dragCenter<center){
      list.insertBefore(dragEl,items[i]);
      dragStartY=y;
      dragEl.style.transform='translateY(0)';
      break;
    }
  }
}

function onDragTouchEnd(){
  if(!isDragging)return;
  isDragging=false;
  document.removeEventListener('touchmove',onDragTouchMove);
  document.removeEventListener('touchend',onDragTouchEnd);
  // Restore panel scrolling
  document.getElementById('p2').style.overflowY='auto';
  if(dragEl){
    dragEl.style.opacity='';
    dragEl.style.zIndex='';
    dragEl.style.boxShadow='';
    dragEl.style.transform='';
    dragEl.style.transition='';
    // Keep data-dragging for a moment to prevent click
    const el=dragEl;
    setTimeout(()=>{if(el)el.removeAttribute('data-dragging');},100);
  }
  // Save new order — preserve all item IDs (tasks, notes, lists)
  const list=document.getElementById('today-list');
  if(list){
    const newIds=[...list.querySelectorAll('.today-item')].map(el=>el.getAttribute('data-id'));
    todayIds=newIds;
    saveToday(todayIds);
    render(['tasks']);
  }
  dragEl=null;dragId=null;
}

// --- Service Worker & Notifications ---
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    console.log('SW registered');
    // Schedule reminders for today on load
    scheduleRemindersForToday();
  }).catch(err=>console.log('SW registration failed:',err));
}

function requestNotificationPermission(){
  if(!('Notification' in window))return Promise.resolve('denied');
  if(Notification.permission==='granted')return Promise.resolve('granted');
  if(Notification.permission==='denied')return Promise.resolve('denied');
  return Notification.requestPermission();
}

function scheduleRemindersForToday(){
  requestNotificationPermission().then(permission=>{
    if(permission!=='granted')return;
    const today=todayStr();
    const now=new Date();
    // Check tasks with reminders
    tasks.filter(t=>t.status==='active'&&t.dueDate===today&&t.reminder).forEach(t=>{
      scheduleNotification(t.title,t.reminder,t.id);
    });
    // Check recurring with next date = today
    recurring.forEach(r=>{
      if(r.reminder){
        const nextDate=getNextRecurringDate(r);
        if(nextDate===today)scheduleNotification(r.title,r.reminder,r.id);
      }
    });
  });
}

function scheduleNotification(title,reminderTime,id){
  const now=new Date();
  const today=todayStr();
  const [h,m]=reminderTime.split(':').map(Number);
  const target=new Date(today+'T'+String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':00');
  const delay=target-now;
  if(delay<=0)return; // Already passed
  if(!navigator.serviceWorker||!navigator.serviceWorker.controller)return;
  navigator.serviceWorker.controller.postMessage({
    type:'SCHEDULE_NOTIFICATION',
    title:'📋 '+title,
    body:'予定のリマインドです',
    delay:delay,
    tag:'reminder-'+id
  });
}

function showReminderSetting(itemId,itemType){
  // itemType: 'task', 'recurring'
  const item=itemType==='task'?tasks.find(t=>t.id===itemId):recurring.find(r=>r.id===itemId);
  if(!item)return;
  const currentReminder=item.reminder||'';
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:16px';
  overlay.innerHTML=`<div style="background:#1f2937;border:1px solid #374151;border-radius:12px;padding:20px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px">
    <div style="font-size:14px;font-weight:600;color:#f1f5f9">🔔 リマインド設定</div>
    <div style="font-size:12px;color:#9ca3af">${item.title}</div>
    <input id="reminder-time" type="time" value="${currentReminder}" style="width:100%;min-height:44px;padding:10px 12px;border:1px solid #374151;border-radius:8px;font-size:16px;background:#111827;color:#f3f4f6;outline:none;color-scheme:dark">
    <div style="display:flex;gap:8px">
      <button id="reminder-clear" style="flex:1;min-height:40px;border:1px solid #374151;border-radius:8px;background:none;color:#9ca3af;font-size:13px;cursor:pointer">解除</button>
      <button id="reminder-save" style="flex:1;min-height:40px;border:none;border-radius:8px;background:linear-gradient(to right,#374151,#1e3a5f,#374151);color:#fff;font-size:13px;font-weight:600;cursor:pointer">設定</button>
    </div>
    <button id="reminder-cancel" style="min-height:36px;border:none;background:none;color:#6b7280;font-size:13px;cursor:pointer">キャンセル</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',function(e){if(e.target===overlay)document.body.removeChild(overlay)});
  document.getElementById('reminder-cancel').addEventListener('click',function(){document.body.removeChild(overlay)});
  document.getElementById('reminder-clear').addEventListener('click',function(){
    if(itemType==='task'){tasks=tasks.map(t=>t.id===itemId?{...t,reminder:null}:t);saveTasks(tasks)}
    else{recurring=recurring.map(r=>r.id===itemId?{...r,reminder:null}:r);saveRecurring(recurring)}
    document.body.removeChild(overlay);
    render(['tasks']);
  });
  document.getElementById('reminder-save').addEventListener('click',function(){
    const time=document.getElementById('reminder-time').value;
    if(!time)return;
    requestNotificationPermission().then(permission=>{
      if(permission!=='granted'){alert('通知が許可されていません。ブラウザの設定から許可してください。');return}
      if(itemType==='task'){tasks=tasks.map(t=>t.id===itemId?{...t,reminder:time}:t);saveTasks(tasks)}
      else{recurring=recurring.map(r=>r.id===itemId?{...r,reminder:time}:r);saveRecurring(recurring)}
      // Schedule if today
      const today=todayStr();
      const item2=itemType==='task'?tasks.find(t=>t.id===itemId):recurring.find(r=>r.id===itemId);
      if(item2){
        const dueDate=itemType==='task'?item2.dueDate:getNextRecurringDate(item2);
        if(dueDate===today)scheduleNotification(item2.title,time,itemId);
      }
      document.body.removeChild(overlay);
      render(['tasks']);
    });
  });
}
