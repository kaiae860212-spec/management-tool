<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0%25' y1='100%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%231e3a8a'/%3E%3Cstop offset='40%25' stop-color='%231e1b6e'/%3E%3Cstop offset='100%25' stop-color='%230f0a3e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='256' cy='256' r='250' fill='url(%23bg)'/%3E%3Cpath d='M130 350V180l126 110 126-110v170' stroke='white' stroke-width='34' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<title>Management Tool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111827;color:#e5e7eb;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;overscroll-behavior-x:none}
header{display:flex;align-items:center;justify-content:space-between;background:#030712;padding:0 16px;height:48px;border-bottom:1px solid #1f2937;flex-shrink:0}
header h1{font-size:14px;font-weight:600;color:#f3f4f6;display:flex;align-items:center;gap:8px}
header .icon{width:24px;height:24px;border-radius:6px;background:linear-gradient(to right,#374151,#1e3a5f,#374151);display:flex;align-items:center;justify-content:center}
header .icon svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
header .fs-btn{width:34px;height:34px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
header .fs-btn svg{width:16px;height:16px;stroke:#6b7280;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
header .fs-btn:active{background:rgba(55,65,81,0.5)}
header .fs-btn:active svg{stroke:#60a5fa}
.tabs{display:flex;background:#030712;border-bottom:1px solid #1f2937;flex-shrink:0}
.tabs button{flex:1;padding:14px 0;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;border:none;border-bottom:2px solid transparent;background:none;color:#6b7280;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color 0.2s}
.tabs button.active{color:#60a5fa;border-bottom-color:#60a5fa}

/* Swipe panels */
.swipe-wrapper{flex:1;overflow:hidden;position:relative}
.swipe-track{display:flex;height:100%;width:500%;will-change:transform}
.swipe-track.animating{transition:transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)}
.panel{width:calc(100vw);height:100%;overflow-y:auto;padding:16px;padding-bottom:80px;display:flex;flex-direction:column;gap:20px}

.form{padding:12px;background:rgba(31,41,55,0.6);border:1px solid #374151;border-radius:12px;display:flex;flex-direction:column;gap:8px}
.form input[type=text]{width:100%;min-height:40px;padding:10px 12px;border:1px solid #374151;border-radius:8px;font-size:15px;background:#111827;color:#f3f4f6;outline:none;-webkit-appearance:none}
.form input[type=date]{width:100%;min-height:40px;padding:10px 12px;border:1px solid #374151;border-radius:8px;font-size:15px;background:#111827;color:#f3f4f6;outline:none;-webkit-appearance:none;color-scheme:dark}
.form input[type=date]:invalid{color:#4b5563}
.form input[type=text]:focus,.form input[type=date]:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,0.3)}
.form input::placeholder{color:#4b5563}
.form label.check{display:flex;align-items:center;gap:8px;font-size:13px;color:#d1d5db;padding:2px 0}
.form label.check input{width:18px;height:18px;accent-color:#1d4ed8}
.btn{min-height:40px;width:33%;border:none;border-radius:8px;font-size:14px;font-weight:600;color:#fff;background:linear-gradient(to right,#374151,#1e3a5f,#374151);cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:0.8}
.section-title{font-size:14px;font-weight:700;color:#d1d5db;text-transform:uppercase;letter-spacing:0.05em;display:flex;align-items:center;gap:8px;padding-bottom:8px}
.section-title .badge{width:22px;height:22px;border-radius:6px;background:linear-gradient(to right,#374151,#1e3a5f,#374151);display:flex;align-items:center;justify-content:center}
.section-title .badge svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.section-title .count{color:#6b7280;font-weight:500}
.today-item{display:flex;align-items:center;gap:8px;padding:12px 14px;background:linear-gradient(to right,rgba(55,65,81,0.5),rgba(37,99,135,0.4),rgba(55,65,81,0.5));border:1px solid rgba(56,130,176,0.3);border-radius:12px}
.today-item .complete-btn{width:30px;height:30px;border-radius:50%;border:2px solid #6b8cae;background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.today-item .complete-btn svg{width:12px;height:12px;stroke:#6b8cae;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.today-item .complete-btn:active{border-color:#60a5fa;background:rgba(96,165,250,0.1)}
.today-item .complete-btn:active svg{stroke:#60a5fa}
.today-item .num{font-size:13px;font-weight:700;color:#7cb8d9;width:18px;text-align:center;flex-shrink:0}
.today-item .info{flex:1;min-width:0}
.today-item .info .title{font-size:14px;color:#f1f5f9;word-break:break-word;line-height:1.4}
.today-item .info .due{font-size:11px;color:#8ba4b8;margin-top:2px}
.today-item .remove{width:28px;height:28px;border:none;background:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.today-item .remove svg{width:14px;height:14px;stroke:#6b8cae;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.today-item .remove:active svg{stroke:#f87171}
.task{display:flex;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(135deg,rgba(31,41,55,0.7),rgba(30,58,95,0.4));border:1px solid rgba(55,65,81,0.6);border-radius:12px}
.task.type-skdl{background:linear-gradient(135deg,rgba(31,41,55,0.7),rgba(30,58,95,0.4))}
.task.type-note{background:linear-gradient(135deg,rgba(31,41,55,0.7),rgba(30,58,95,0.4))}
.task.type-list{background:linear-gradient(135deg,rgba(31,41,55,0.7),rgba(30,58,95,0.4))}
.task .complete-btn{width:34px;height:34px;border-radius:50%;border:2px solid #4b5563;background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.task .complete-btn svg{width:14px;height:14px;stroke:#4b5563;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.task .complete-btn:active{border-color:#60a5fa;background:rgba(96,165,250,0.1)}
.task .complete-btn:active svg{stroke:#60a5fa}
.task .info{flex:1;min-width:0}
.task .info .title{font-size:14px;color:#9ca3af;word-break:break-word;line-height:1.4}
.task .info .due{font-size:11px;color:#6b7280;margin-top:2px}
.task .actions{display:flex;gap:2px;flex-shrink:0}
.task .actions button{width:34px;height:34px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.task .actions button svg{width:15px;height:15px;stroke:#4b5563;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.task .actions button:active{background:rgba(55,65,81,0.5)}
.task .actions button:active svg{stroke:#60a5fa}
.task .actions .del:active svg{stroke:#f87171}
.sun-btn.active svg{stroke:#93c5fd;fill:#93c5fd}
.completed-task{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(31,41,55,0.5);border:1px solid rgba(55,65,81,0.4);border-radius:12px;opacity:0.6}
.completed-task .check{width:30px;height:30px;border-radius:50%;background:rgba(29,78,216,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.completed-task .check svg{width:12px;height:12px;stroke:#60a5fa;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.completed-task .title{flex:1;font-size:14px;color:#9ca3af;text-decoration:line-through;word-break:break-word}
.completed-task .del{width:30px;height:30px;border:none;background:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.completed-task .del svg{width:13px;height:13px;stroke:#6b8cae;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.empty{text-align:center;padding:40px 0;color:#6b7280;font-size:14px}
.memo{margin:0 -16px;padding:0 4px;height:100%;display:flex;flex-direction:column}
.memo-tabs{display:flex;gap:4px;margin-bottom:8px}
.memo-tabs button{flex:1;padding:8px 0;font-size:12px;font-weight:600;border:1px solid #374151;border-radius:8px;background:none;color:#6b7280;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.2s}
.memo-tabs button.active{color:#60a5fa;border-color:#60a5fa;background:rgba(96,165,250,0.1)}
.memo-editor{width:100%;flex:1;height:calc(100vh - 220px);height:calc(100dvh - 220px);padding:12px;border:1px solid #374151;border-radius:10px;font-size:14px;background:#111827;color:#d1d5db;overflow-y:auto;outline:none;-webkit-appearance:none;white-space:pre-wrap;word-break:break-word;min-height:200px}
.memo-editor:focus{border-color:#3b82f6}
.memo-editor:empty::before{content:attr(data-placeholder);color:#4b5563;pointer-events:none}

/* Animations */
@keyframes slideIn{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.9)}}
@keyframes checkPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.anim-slide-in{animation:slideIn 0.3s ease-out}
.anim-fade-out{animation:fadeOut 0.3s ease-in forwards}
.anim-check{animation:checkPop 0.3s ease-out}

/* Pomodoro Timer */
.pomo-bar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(31,41,55,0.8);border:1px solid #374151;border-radius:10px;margin-bottom:4px}
.pomo-bar .pomo-time{font-size:18px;font-weight:700;color:#f1f5f9;font-variant-numeric:tabular-nums;min-width:50px;text-align:center}
.pomo-bar .pomo-label{font-size:10px;color:#9ca3af;flex:1}
.pomo-bar .pomo-btn{width:28px;height:28px;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pomo-bar .pomo-start{background:rgba(55,65,81,0.6);border:1px solid #4b5563}
.pomo-bar .pomo-start svg{width:14px;height:14px;stroke:#d1d5db;fill:none;stroke-width:2.5}
.pomo-bar .pomo-pause{background:rgba(55,65,81,0.6);border:1px solid #4b5563}
.pomo-bar .pomo-pause svg{width:12px;height:12px;stroke:#d1d5db;fill:none;stroke-width:2.5}
.pomo-bar .pomo-reset{background:rgba(55,65,81,0.4);border:1px solid #374151}
.pomo-bar .pomo-reset svg{width:12px;height:12px;stroke:#9ca3af;fill:none;stroke-width:2}
/* Pomo button theme overrides */
body.light-mode .pomo-bar .pomo-start{background:rgba(226,232,240,0.8);border-color:#94a3b8}
body.light-mode .pomo-bar .pomo-start svg{stroke:#1e293b}
body.light-mode .pomo-bar .pomo-pause{background:rgba(226,232,240,0.8);border-color:#94a3b8}
body.light-mode .pomo-bar .pomo-pause svg{stroke:#1e293b}
body.light-mode .pomo-bar .pomo-reset{background:rgba(241,245,249,0.8);border-color:#cbd5e1}
body.light-mode .pomo-bar .pomo-reset svg{stroke:#475569}
body.ivory-warm .pomo-bar .pomo-start{background:rgba(232,223,212,0.6);border-color:#c4b59b}
body.ivory-warm .pomo-bar .pomo-start svg{stroke:#3d3329}
body.ivory-warm .pomo-bar .pomo-pause{background:rgba(232,223,212,0.6);border-color:#c4b59b}
body.ivory-warm .pomo-bar .pomo-pause svg{stroke:#3d3329}
body.ivory-warm .pomo-bar .pomo-reset{background:rgba(245,240,232,0.6);border-color:#e8dfd4}
body.ivory-warm .pomo-bar .pomo-reset svg{stroke:#8b7355}
body.ivory-cool .pomo-bar .pomo-start{background:rgba(212,217,205,0.6);border-color:#a8b5a0}
body.ivory-cool .pomo-bar .pomo-start svg{stroke:#2d3436}
body.ivory-cool .pomo-bar .pomo-pause{background:rgba(212,217,205,0.6);border-color:#a8b5a0}
body.ivory-cool .pomo-bar .pomo-pause svg{stroke:#2d3436}
body.ivory-cool .pomo-bar .pomo-reset{background:rgba(236,238,232,0.6);border-color:#d4d9cd}
body.ivory-cool .pomo-bar .pomo-reset svg{stroke:#636e72}
body.ivory-pink .pomo-bar .pomo-start{background:rgba(240,206,214,0.4);border-color:#dea0b5}
body.ivory-pink .pomo-bar .pomo-start svg{stroke:#4a2030}
body.ivory-pink .pomo-bar .pomo-pause{background:rgba(240,206,214,0.4);border-color:#dea0b5}
body.ivory-pink .pomo-bar .pomo-pause svg{stroke:#4a2030}
body.ivory-pink .pomo-bar .pomo-reset{background:rgba(250,232,236,0.6);border-color:#f0ced6}
body.ivory-pink .pomo-bar .pomo-reset svg{stroke:#9e4a6a}
body.ivory-blue .pomo-bar .pomo-start{background:rgba(190,211,232,0.4);border-color:#90b8dc}
body.ivory-blue .pomo-bar .pomo-start svg{stroke:#1a365d}
body.ivory-blue .pomo-bar .pomo-pause{background:rgba(190,211,232,0.4);border-color:#90b8dc}
body.ivory-blue .pomo-bar .pomo-pause svg{stroke:#1a365d}
body.ivory-blue .pomo-bar .pomo-reset{background:rgba(227,239,248,0.6);border-color:#bed3e8}
body.ivory-blue .pomo-bar .pomo-reset svg{stroke:#4a7ab5}
.pomo-progress{height:3px;background:#1f2937;border-radius:2px;overflow:hidden;margin-top:6px}
.pomo-progress-fill{height:100%;background:linear-gradient(to right,#3b82f6,#60a5fa);border-radius:2px;transition:width 1s linear}

/* Quick Input Bar - REMOVED */
/* Calendar light mode */

/* Streak badge */
.streak-badge{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;color:#f97316;background:rgba(249,115,22,0.1);padding:1px 6px;border-radius:10px;margin-left:4px}

/* Dark/Light Mode CSS Variables */
:root{--bg-primary:#111827;--bg-secondary:#030712;--bg-card:rgba(31,41,55,0.7);--bg-card-solid:#1f2937;--bg-input:#111827;--border-primary:#1f2937;--border-secondary:#374151;--border-btn:#4b5563;--text-primary:#e5e7eb;--text-heading:#f1f5f9;--text-secondary:#9ca3af;--text-muted:#6b7280;--text-icon:#4b5563;--accent:#60a5fa;--accent-dark:#1d4ed8;--completed-bg:rgba(31,41,55,0.5);--completed-border:rgba(55,65,81,0.4);--completed-check-bg:rgba(29,78,216,0.2);--completed-check-stroke:#60a5fa;--pomo-bg:rgba(31,41,55,0.8);--pomo-border:#374151;--pomo-progress-bg:#1f2937}
body.light-mode{--bg-primary:#f1f5f9;--bg-secondary:#ffffff;--bg-card:#ffffff;--bg-card-solid:#ffffff;--bg-input:#ffffff;--border-primary:#cbd5e1;--border-secondary:#94a3b8;--border-btn:#94a3b8;--text-primary:#0f172a;--text-heading:#0f172a;--text-secondary:#334155;--text-muted:#64748b;--text-icon:#64748b;--accent:#2563eb;--accent-dark:#1d4ed8;--completed-bg:#f8fafc;--completed-border:#e2e8f0;--completed-check-bg:rgba(37,99,235,0.1);--completed-check-stroke:#2563eb;--pomo-bg:#ffffff;--pomo-border:#cbd5e1;--pomo-progress-bg:#e2e8f0}
body.ivory-warm{--bg-primary:#faf7f2;--bg-secondary:#f5f0e8;--bg-card:#ffffff;--bg-card-solid:#ffffff;--bg-input:#fffef8;--border-primary:#e8dfd4;--border-secondary:#c4b59b;--border-btn:#c4b59b;--text-primary:#3d3329;--text-heading:#3d3329;--text-secondary:#6b5b45;--text-muted:#8b7355;--text-icon:#8b7355;--accent:#b8860b;--accent-dark:#8b6914;--completed-bg:#faf7f2;--completed-border:#e8dfd4;--completed-check-bg:rgba(184,134,11,0.1);--completed-check-stroke:#b8860b;--pomo-bg:#ffffff;--pomo-border:#e8dfd4;--pomo-progress-bg:#e8dfd4}
body.ivory-cool{--bg-primary:#f5f5f0;--bg-secondary:#eceee8;--bg-card:#ffffff;--bg-card-solid:#ffffff;--bg-input:#fafcf7;--border-primary:#d4d9cd;--border-secondary:#a8b5a0;--border-btn:#a8b5a0;--text-primary:#2d3436;--text-heading:#2d3436;--text-secondary:#4a5568;--text-muted:#636e72;--text-icon:#636e72;--accent:#00897b;--accent-dark:#00695c;--completed-bg:#f5f5f0;--completed-border:#d4d9cd;--completed-check-bg:rgba(0,137,123,0.1);--completed-check-stroke:#00897b;--pomo-bg:#ffffff;--pomo-border:#d4d9cd;--pomo-progress-bg:#d4d9cd}
body.ivory-pink{--bg-primary:#fdf2f4;--bg-secondary:#fae8ec;--bg-card:#ffffff;--bg-card-solid:#ffffff;--bg-input:#fffafc;--border-primary:#f0ced6;--border-secondary:#dea0b5;--border-btn:#dea0b5;--text-primary:#4a2030;--text-heading:#4a2030;--text-secondary:#7a3a55;--text-muted:#9e4a6a;--text-icon:#9e4a6a;--accent:#d63384;--accent-dark:#a71d6e;--completed-bg:#fdf2f4;--completed-border:#f0ced6;--completed-check-bg:rgba(214,51,132,0.1);--completed-check-stroke:#d63384;--pomo-bg:#ffffff;--pomo-border:#f0ced6;--pomo-progress-bg:#f0ced6}
body.ivory-blue{--bg-primary:#f0f6fc;--bg-secondary:#e3eff8;--bg-card:#ffffff;--bg-card-solid:#ffffff;--bg-input:#f8fbff;--border-primary:#bed3e8;--border-secondary:#90b8dc;--border-btn:#90b8dc;--text-primary:#1a365d;--text-heading:#1a365d;--text-secondary:#3a5a80;--text-muted:#4a7ab5;--text-icon:#4a7ab5;--accent:#1976d2;--accent-dark:#0d47a1;--completed-bg:#f0f6fc;--completed-border:#bed3e8;--completed-check-bg:rgba(25,118,210,0.1);--completed-check-stroke:#1976d2;--pomo-bg:#ffffff;--pomo-border:#bed3e8;--pomo-progress-bg:#bed3e8}
body.light-mode{background:var(--bg-primary);color:var(--text-primary)}
body.light-mode header{background:var(--bg-secondary);border-bottom-color:var(--border-primary)}
body.light-mode header h1{color:var(--text-primary)}
body.light-mode header .fs-btn svg{stroke:var(--text-muted)}
body.light-mode .tabs{background:var(--bg-secondary);border-bottom-color:var(--border-primary)}
body.light-mode .tabs button{color:var(--text-muted)}
body.light-mode .tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
body.light-mode .task{background:var(--bg-card);border:1px solid var(--border-primary)}
body.light-mode .task .info .title{color:var(--text-heading)}
body.light-mode .task .info .due{color:var(--text-secondary)}
body.light-mode .task .complete-btn{border-color:var(--border-btn)}
body.light-mode .task .complete-btn svg{stroke:var(--border-btn)}
body.light-mode .task .actions button svg{stroke:var(--text-muted)}
body.light-mode .today-item{background:linear-gradient(135deg,#dbeafe,#eff6ff);border:1px solid #93c5fd}
body.light-mode .today-item .info .title{color:var(--text-heading)!important}
body.light-mode .today-item .info .due{color:var(--text-secondary)!important}
body.light-mode .today-item .complete-btn{border-color:var(--accent)}
body.light-mode .today-item .complete-btn svg{stroke:var(--accent)}
body.light-mode .today-item .num{color:var(--accent-dark)}
body.light-mode .memo-editor{background:var(--bg-secondary);border-color:var(--border-primary);color:var(--text-primary)}
body.light-mode .memo-tabs button{border-color:var(--border-primary);color:var(--text-secondary)}
body.light-mode .memo-tabs button.active{color:var(--accent);border-color:var(--accent);background:rgba(37,99,235,0.06)}
body.light-mode .note-card{background:var(--bg-card);border:1px solid var(--border-primary)}
body.light-mode .note-card .note-title{color:var(--text-heading)}

.note-card{display:flex;align-items:center;gap:8px;padding:12px 14px;background:linear-gradient(to right,rgba(55,65,81,0.5),rgba(37,99,135,0.4),rgba(55,65,81,0.5));border:1px solid rgba(56,130,176,0.3);border-radius:12px;min-height:44px}
.note-card .note-title{flex:1;font-size:14px;color:#f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;word-break:break-word;line-height:1.4}
.note-card .note-title.placeholder{color:#6b7280;font-style:italic}
.note-card .actions{display:flex;gap:2px;flex-shrink:0}
.note-card .actions button{width:34px;height:34px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.note-card .actions button svg{width:15px;height:15px;stroke:#6b8cae;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.note-card .actions button:active{background:rgba(55,65,81,0.5)}
.note-card .actions button:active svg{stroke:#60a5fa}
.note-card .actions button.del:active svg{stroke:#f87171}
.note-card .actions button:disabled{opacity:0.3;pointer-events:none}
.note-colors{display:flex;gap:6px;align-items:center;margin-left:8px}
.note-colors .color-dot{width:18px;height:18px;border-radius:50%;border:2px solid #374151;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.note-colors .color-dot.active{border-color:#60a5fa;box-shadow:0 0 0 2px rgba(96,165,250,0.4)}
.note-detail{display:flex;flex-direction:column;gap:12px;height:100%;margin:0 -16px;padding:0 4px}
.note-detail .back-btn{width:44px;height:44px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.note-detail .back-btn svg{width:18px;height:18px;stroke:#60a5fa;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.note-detail input[type=text]{width:100%;min-height:48px;padding:14px 16px;border:none;border-bottom:1px solid #e5e2d8;border-radius:0;font-size:20px;font-weight:600;background:transparent;color:#1f2937;outline:none;-webkit-appearance:none}

.note-detail textarea:focus{border-color:transparent;box-shadow:none}
.note-add-btn{min-height:44px;width:100%;border:none;border-radius:8px;font-size:14px;font-weight:600;color:#fff;background:linear-gradient(to right,#374151,#1e3a5f,#374151);cursor:pointer;-webkit-tap-highlight-color:transparent;margin-bottom:12px}

body.light-mode .task{background:linear-gradient(135deg,#ffffff,#eff6ff);border:1px solid #cbd5e1}

body.light-mode .task.type-note{background:linear-gradient(135deg,#ffffff,#eff6ff)}
body.light-mode .task.type-list{background:linear-gradient(135deg,#ffffff,#eff6ff)}
body.ivory-warm .task{background:linear-gradient(135deg,#ffffff,#f8f4ed);border:1px solid #e8dfd4}
body.ivory-cool .task{background:linear-gradient(135deg,#ffffff,#f0f5f2);border:1px solid #d4d9cd}

/* Pinned card highlight */
.note-card.pinned{border-left:3px solid #f59e0b!important}
/* Ivory button theming */
body.ivory-warm .btn{background:linear-gradient(to right,#c9a84c,#b8860b,#c9a84c)}
body.ivory-cool .btn{background:linear-gradient(to right,#26a69a,#00897b,#26a69a)}
body.ivory-pink .btn{background:linear-gradient(to right,#e05694,#d63384,#e05694)}
body.ivory-blue .btn{background:linear-gradient(to right,#42a5f5,#1976d2,#42a5f5)}
body.ivory-warm .btn:active,body.ivory-cool .btn:active,body.ivory-pink .btn:active,body.ivory-blue .btn:active{opacity:0.8}

/* Step 4: Component classes */
.bell-on{color:#fbbf24;font-size:11px;margin-right:3px}
.bell-off{color:var(--text-muted,#6b7280);font-size:11px;opacity:0.5;margin-right:3px}
.bell-on-sm{color:#fbbf24;font-size:10px;margin-right:3px}
.bell-off-sm{color:var(--text-muted,#6b7280);font-size:10px;opacity:0.5;margin-right:3px}
.type-lbl{font-size:10px;font-weight:700;margin-right:4px}
.type-lbl-task{color:#60a5fa;background:rgba(96,165,250,0.1);padding:1px 5px;border-radius:4px}
.type-lbl-skdl{color:#a78bfa;background:rgba(167,139,250,0.1);padding:1px 5px;border-radius:4px}
.type-lbl-note{color:#4ade80;font-weight:600}
.type-lbl-list{color:#fbbf24;font-weight:600}
.complete-btn-sm{width:28px;height:28px;border-radius:50%;border:2px solid var(--border-btn,#4b5563);background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.complete-btn-sm svg{width:12px;height:12px;stroke:var(--border-btn,#4b5563);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.complete-btn-sm:active{border-color:var(--accent);background:rgba(96,165,250,0.1)}
.complete-btn-sm:active svg{stroke:var(--accent)}
.note-card .complete-btn-sm{width:30px;height:30px}
.delete-btn-sm{width:28px;height:28px;border:none;background:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.delete-btn-sm svg{width:14px;height:14px;stroke:var(--text-muted,#6b7280);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.delete-btn-sm:active svg{stroke:#f87171}
.time-label{font-size:11px;color:var(--text-secondary,#9ca3af);margin-right:3px}
.cal-card{display:flex;align-items:center;gap:8px;padding:10px 12px;background:linear-gradient(135deg,rgba(31,41,55,0.7),rgba(30,58,95,0.4));border:1px solid rgba(55,65,81,0.6);border-radius:10px}
.cal-card .cal-info{flex:1;min-width:0;cursor:pointer}
.cal-card .cal-info .cal-title{font-size:13px;color:var(--text-heading,#f1f5f9)}
.cal-card .cal-info .cal-due{font-size:11px;color:var(--text-muted,#6b7280);margin-top:2px}
body.light-mode .cal-card,body.ivory-warm .cal-card,body.ivory-cool .cal-card,body.ivory-pink .cal-card,body.ivory-blue .cal-card{background:var(--bg-card,#ffffff);border-color:var(--border-primary)}
.complete-btn-lg{width:34px;height:34px;border-radius:50%;border:2px solid var(--border-btn,#4b5563);background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.complete-btn-lg svg{width:14px;height:14px;stroke:var(--border-btn,#4b5563);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.complete-btn-lg:active{border-color:var(--accent);background:rgba(96,165,250,0.1)}
.complete-btn-lg:active svg{stroke:var(--accent)}
.delete-btn-lg{width:34px;height:34px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.delete-btn-lg svg{width:15px;height:15px;stroke:var(--text-muted,#6b7280);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.delete-btn-lg:active svg{stroke:#f87171}
.sun-btn{width:34px;height:34px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.sun-btn svg{width:15px;height:15px;stroke:var(--border-btn,#4b5563);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sun-btn.active svg{stroke:#93c5fd;fill:#93c5fd}
.pin-btn{width:34px;height:34px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pin-btn svg{width:15px;height:15px;stroke:var(--border-btn,#4b5563);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.pin-btn.active svg{stroke:#f59e0b;fill:#f59e0b}
.undo-btn{width:30px;height:30px;border-radius:50%;background:var(--completed-check-bg,rgba(29,78,216,0.2));display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.undo-btn svg{width:12px;height:12px;stroke:var(--completed-check-stroke,#60a5fa);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<header><h1><span class="icon" style="background:linear-gradient(135deg,#1e3a8a,#1e1b6e,#0f0a3e);border-radius:50%"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><path d="M4 17V9l8 7 8-7v8"/></svg></span>Management Tool<span style="font-size:9px;color:#6b7280;font-weight:400;margin-left:6px">v5.017</span></h1><div style="display:flex;gap:4px"><button class="fs-btn" id="dark-toggle" onclick="toggleDarkMode()" aria-label="Dark Mode"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 0111.21 3 7 7 0 0012 21a7 7 0 009-8.21z"/></svg></button><button class="fs-btn" onclick="showDataModal()" aria-label="Data"><svg viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg></button><button class="fs-btn" onclick="location.reload()" aria-label="Reload"><svg viewBox="0 0 24 24"><path d="M4 4v5h5M20 20v-5h-5"/><path d="M20.49 9A9 9 0 005.64 5.64L4 4m16 16l-1.64-1.64A9 9 0 013.51 15"/></svg></button></div></header>
<div class="tabs">
<button id="tab-0" onclick="goTo(0)">Cal</button>
<button id="tab-1" onclick="goTo(1)">Memo</button>
<button id="tab-2" class="active" onclick="goTo(2)">Tasks</button>
<button id="tab-3" onclick="goTo(3)">Notes</button>
<button id="tab-4" onclick="goTo(4)">Lists</button>
</div>
<div class="swipe-wrapper" id="sw">
<div class="swipe-track" id="track">
<div class="panel" id="p0"></div>
<div class="panel" id="p1"></div>
<div class="panel" id="p2"></div>
<div class="panel" id="p3"></div>
<div class="panel" id="p4"></div>

<script>
// --- Storage ---
const TASKS_KEY='tm-tasks',TODAY_KEY='tm-today',MEMO_KEY='tm-memo',NOTES_KEY='tm-notes',LISTS_KEY='tm-lists',DISMISS_KEY='tm-today-dismiss',RECUR_KEY='tm-recurring',DARK_KEY='tm-dark-mode',MEMO_TAB_KEY='tm-memo-tab',PIN_KEY='tm-pinned';

// --- Theme helper ---
function isLight(){return document.body.classList.contains('light-mode')||document.body.classList.contains('ivory-warm')||document.body.classList.contains('ivory-cool')||document.body.classList.contains('ivory-pink')||document.body.classList.contains('ivory-blue')}
function itemTitleColor(item,defaultColor){const c=item.color;return(c&&c!=='#1f2937')?c:defaultColor||(isLight()?'#0f172a':'#f1f5f9')}

// --- UI component helpers ---
function bellIcon(item){return item.reminderEnabled?'<span class="bell-on">🔔</span>':'<span class="bell-off">🔔</span>'}
function bellIconSm(item){return item.reminderEnabled?'<span class="bell-on-sm">🔔</span>':'<span class="bell-off-sm">🔔</span>'}
function typeLabel(type){const m={task:'<span class="type-lbl type-lbl-task">TASK</span>',skdl:'<span class="type-lbl type-lbl-skdl">SKDL</span>',note:'<span class="type-lbl type-lbl-note">NOTE</span>',list:'<span class="type-lbl type-lbl-list">LIST</span>'};return m[type]||''}
function completeBtnSm(onclick){return `<button class="complete-btn-sm" onclick="${onclick}"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></button>`}
function completeBtn(onclick){return `<button class="complete-btn-lg" onclick="${onclick}"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></button>`}
function deleteBtn(onclick){return `<button class="delete-btn-lg" onclick="${onclick}"><svg viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>`}
function deleteBtnSm(onclick){return `<button class="delete-btn-sm" onclick="${onclick}"><svg viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>`}
function sunBtn(id,isActive,onclick){return `<button class="sun-btn${isActive?' active':''}" onclick="${onclick}"><svg viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg></button>`}
function pinBtn(id,pinned,onclick){return `<button class="pin-btn${pinned?' active':''}" onclick="${onclick}" title="Pin"><svg viewBox="0 0 24 24"><path d="M12 22L12 12M8 17l4 5 4-5M5 12h14v-2l-3-3V3l-4-1-4 1v4l-3 3v2z"/></svg></button>`}
function undoBtn(onclick){return `<button class="undo-btn" onclick="${onclick}" title="Undo"><svg viewBox="0 0 24 24"><path d="M3 10h10a5 5 0 015 5v0a5 5 0 01-5 5H8M3 10l4-4M3 10l4 4"/></svg></button>`}
function completedCard(title,lbl,undoClick,delClick,openClick){return `<div class="completed-task"${openClick?' onclick="'+openClick+'" style="cursor:pointer"':''}>${undoBtn("event.stopPropagation();"+undoClick)}<div style="flex:1;min-width:0"><div style="font-size:14px;color:#9ca3af;text-decoration:line-through;word-break:break-word">${lbl}${esc(title)}</div></div><button class="del" onclick="event.stopPropagation();${delClick}" title="Delete"><svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:#6b8cae;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button></div>`}
// Full-size note card (Upcoming/Long-term)
function noteCard(n,opts){const isT=todayIds.includes(n.id);const bHtml=opts&&opts.noBell?'':bellIcon(n);const timeHtml=n.dueTime?'<span class="time-label">'+n.dueTime+'</span>':'';const dueStr=n.dueDate?'Due: '+n.dueDate:'No due date';const titleColor=(n.color&&n.color!=='#1f2937')?n.color:(isLight()?'#1e293b':'#9ca3af');return `<div class="task type-note">${completeBtn("event.stopPropagation();completeNote('"+n.id+"')")}<div class="info" onclick="goTo(3);setTimeout(()=>openNote('${n.id}'),100)" style="cursor:pointer"><div class="title" style="color:${titleColor}">${esc(n.title||'Untitled')}</div><div class="due">${bHtml}${typeLabel('note')}${timeHtml}${dueStr}</div></div><div class="actions">${sunBtn(n.id,isT,"event.stopPropagation();toggleTodayNote('"+n.id+"')")}${deleteBtn("event.stopPropagation();deleteNote('"+n.id+"')")}</div></div>`}
// Full-size list card (Upcoming/Long-term)
function listCard(l,opts){const isT=todayIds.includes(l.id);const bHtml=opts&&opts.noBell?'':bellIcon(l);const timeHtml=l.dueTime?'<span class="time-label">'+l.dueTime+'</span>':'';const dueStr=l.dueDate?'Due: '+l.dueDate:'No due date';const titleColor=(l.color&&l.color!=='#1f2937')?l.color:(isLight()?'#1e293b':'#9ca3af');return `<div class="task type-list">${completeBtn("event.stopPropagation();completeList('"+l.id+"')")}<div class="info" onclick="goTo(4);setTimeout(()=>openList('${l.id}'),100)" style="cursor:pointer"><div class="title" style="color:${titleColor}">${esc(l.title||'Untitled')}</div><div class="due">${bHtml}${typeLabel('list')}${timeHtml}${dueStr}</div></div><div class="actions">${sunBtn(l.id,isT,"event.stopPropagation();toggleTodayList('"+l.id+"')")}${deleteBtn("event.stopPropagation();deleteList('"+l.id+"')")}</div></div>`}
// Note card for Notes tab list view
function noteListCard(n){const titleColor=(n.color&&n.color!=='#1f2937')?n.color:(isLight()?'#0f172a':'#f1f5f9');const displayTitle=n.title?esc(n.title).slice(0,50):'';const nBell=bellIconSm(n);const nDue=n.dueDate?(n.dueTime?n.dueTime+' ':'')+'Due: '+n.dueDate:'No due date';return `<div class="note-card${isPinned(n.id)?' pinned':''}" data-id="${n.id}" onclick="openNote('${n.id}')"><button onclick="event.stopPropagation();completeNote('${n.id}')" style="width:30px;height:30px;border-radius:50%;border:2px solid #4b5563;background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:#4b5563;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><path d="M5 13l4 4L19 7"/></svg></button><div style="flex:1;min-width:0"><div class="note-title${n.title?'':' placeholder'}" style="color:${titleColor}">${displayTitle||'Untitled'}</div><div style="font-size:10px;color:#6b7280;margin-top:2px">${nBell}${typeLabel('note')}${nDue}</div></div><div class="actions" onclick="event.stopPropagation()">${pinBtn(n.id,isPinned(n.id),"event.stopPropagation();togglePin('note','"+n.id+"')")}<button class="del" onclick="deleteNote('${n.id}')"><svg viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button></div></div>`}
// List card for Lists tab list view
function listListCard(l){const titleColor=(l.color&&l.color!=='#1f2937')?l.color:(isLight()?'#0f172a':'#f1f5f9');const displayTitle=l.title?esc(l.title).slice(0,50):'';const lBell=bellIconSm(l);const lDue=l.dueDate?(l.dueTime?l.dueTime+' ':'')+'Due: '+l.dueDate:'No due date';return `<div class="note-card${isPinned(l.id)?' pinned':''}" data-id="${l.id}" onclick="openList('${l.id}')"><button onclick="event.stopPropagation();completeList('${l.id}')" style="width:30px;height:30px;border-radius:50%;border:2px solid #4b5563;background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:#4b5563;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><path d="M5 13l4 4L19 7"/></svg></button><div style="flex:1;min-width:0"><div class="note-title${l.title?'':' placeholder'}" style="color:${titleColor}">${displayTitle||'Untitled'}</div><div style="font-size:10px;color:#6b7280;margin-top:2px">${lBell}${typeLabel('list')}${lDue}</div></div><div class="actions" onclick="event.stopPropagation()">${pinBtn(l.id,isPinned(l.id),"event.stopPropagation();togglePin('list','"+l.id+"')")}<button class="del" onclick="deleteList('${l.id}')"><svg viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button></div></div>`}
// Calendar day task card (smaller variant)
function calTaskCard(t,selDay){const overdue=t.dueDate<todayStr();const titleColor=overdue?'#f87171':(t.color&&t.color!=='#1f2937')?t.color:(isLight()?'#0f172a':'#f1f5f9');const label=t.source==='schedule'?typeLabel('skdl'):typeLabel('task');const bHtml=bellIcon(t);const timeHtml=t.dueTime?'<span class="time-label">'+t.dueTime+'</span>':'';return `<div class="cal-card">${completeBtnSm("completeTask('"+t.id+"')")}<div class="cal-info" onclick="editTask('${t.id}')"><div class="cal-title" style="color:${titleColor}">${esc(t.title)}</div><div class="cal-due">${bHtml}${label}${timeHtml}Due: ${t.dueDate}</div></div>${deleteBtnSm("confirmDelete('task','"+t.id+"')")}</div>`}
// Calendar day recurring card (smaller variant)
function calRecurringCard(r,selDay){const repLabel=r.repeat==='weekly'?'Weekly':r.repeat==='biweekly'?'Biweekly':r.repeat==='monthly'?'Monthly':r.repeat==='yearly'?'Yearly':r.days+'d';const rBell=bellIcon(r);const rTime=r.dueTime?'<span class="time-label">'+r.dueTime+'</span>':'';const calStreak=streakBadge(r);const titleColor=(r.color&&r.color!=='#1f2937')?r.color:(isLight()?'#1e293b':'#f1f5f9');return `<div class="cal-card">${completeBtnSm("completeRecurring('"+r.id+"')")}<div class="cal-info" onclick="editRecurring('${r.id}')"><div class="cal-title" style="color:${titleColor}">${esc(r.title)}</div><div class="cal-due">${rBell}${typeLabel('skdl')}${rTime}🔁 ${repLabel}${calStreak} Due: ${selDay}</div></div>${deleteBtnSm("confirmDelete('recurring','"+r.id+"')")}</div>`}

function loadPinned(){try{return JSON.parse(localStorage.getItem(PIN_KEY))||[]}catch{return[]}}
function savePinned(p){localStorage.setItem(PIN_KEY,JSON.stringify(p))}
function togglePin(type,id){let pinned=loadPinned();const idx=pinned.findIndex(p=>p.id===id);if(idx>=0){pinned.splice(idx,1)}else{pinned.push({id,type})}savePinned(pinned);render();}
function isPinned(id){return loadPinned().some(p=>p.id===id)}
function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(36).slice(2)}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function loadTasks(){try{return JSON.parse(localStorage.getItem(TASKS_KEY))||[]}catch{return[]}}
function saveTasks(t){localStorage.setItem(TASKS_KEY,JSON.stringify(t))}
function loadToday(){try{const d=JSON.parse(localStorage.getItem(TODAY_KEY));if(d&&d.ids)return d.ids;return[]}catch{return[]}}
function saveToday(ids){localStorage.setItem(TODAY_KEY,JSON.stringify({date:todayStr(),ids}))}
function loadMemo(tabNum){return localStorage.getItem('tm-memo-'+(tabNum||1))||''}
function saveMemo(v,tabNum){localStorage.setItem('tm-memo-'+(tabNum||1),v)}
function loadNotes(){try{return JSON.parse(localStorage.getItem(NOTES_KEY))||[]}catch{return[]}}
function saveNotes(n){try{localStorage.setItem(NOTES_KEY,JSON.stringify(n))}catch(e){alert('Failed to save notes. Please check storage capacity.')}}
function loadLists(){try{return JSON.parse(localStorage.getItem(LISTS_KEY))||[]}catch{return[]}}
function saveLists(l){try{localStorage.setItem(LISTS_KEY,JSON.stringify(l))}catch(e){alert('Failed to save lists. Please check storage capacity.')}}
function loadDismissed(){try{const d=JSON.parse(localStorage.getItem(DISMISS_KEY));if(d&&d.date===todayStr())return d.ids||[];return[]}catch{return[]}}
function saveDismissed(ids){localStorage.setItem(DISMISS_KEY,JSON.stringify({date:todayStr(),ids}))}
function loadRecurring(){try{return JSON.parse(localStorage.getItem(RECUR_KEY))||[]}catch{return[]}}
function saveRecurring(r){localStorage.setItem(RECUR_KEY,JSON.stringify(r))}

let tasks=loadTasks();
const cutoff=new Date(Date.now()-14*24*60*60*1000).toISOString();
tasks=tasks.filter(t=>t.status!=='completed'||!t.completedAt||t.completedAt>cutoff);
saveTasks(tasks);
let todayIds=loadToday();
const td=todayStr();
tasks.forEach(t=>{

// --- Auto Backup (3 generation rotation on page load) ---
(function autoBackup(){
  try{
    const data={tasks,todayIds,notes,lists,recurring,dismissedIds,
      memos:{'memo-1':localStorage.getItem('tm-memo-1')||'','memo-2':localStorage.getItem('tm-memo-2')||''},
      people:localStorage.getItem('tm-people')||'[]',
      places:localStorage.getItem('tm-places')||'[]',
      pinned:localStorage.getItem(PIN_KEY)||'[]',
      timestamp:new Date().toISOString()};
    const json=JSON.stringify(data);
    // Rotate: 3 → delete, 2 → 3, 1 → 2, new → 1
    localStorage.removeItem('tm-backup-3');
    const b2=localStorage.getItem('tm-backup-2');
    if(b2)localStorage.setItem('tm-backup-3',b2);
    const b1=localStorage.getItem('tm-backup-1');
    if(b1)localStorage.setItem('tm-backup-2',b1);
    localStorage.setItem('tm-backup-1',json);
  }catch(e){
    console.error('Auto-backup failed:',e);
    setTimeout(()=>alert('⚠️ Auto-backup failed: '+e.message),500);
  }
})();

// --- Swipe ---
let cur=2;
let prevTab=2;
const track=document.getElementById('track');

function getVw(){return window.innerWidth}

function setPos(x,animate){
  if(animate){track.classList.add('animating')}else{track.classList.remove('animating')}
  track.style.transform='translateX('+x+'px)';
}
function snapTo(i){
  cur=i;
  setPos(-i*getVw(),true);
  for(let j=0;j<5;j++)document.getElementById('tab-'+j).className=j===i?'active':'';
  // ⑤ Blur active input on tab change
  if(document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA')){document.activeElement.blur()}
}
function goTo(i){prevTab=cur;
  // Reset detail views when switching tabs
  if(noteView==='detail'){saveNote();noteView='list';currentNoteId=null;}
  if(listView==='detail'){saveList();listView='list';currentListId=null;}
  if(memoCardView==='detail'){memoCardView='list';memoCardId=null;}
  snapTo(i);render()}

// Touch handling
let sx=0,sy=0,dx=0,moving=false,startT=0,swipeInCalArea=false;
const sw=document.getElementById('sw');

sw.addEventListener('touchstart',function(e){
  sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;moving=false;startT=Date.now();
  // Check if touch started inside cal-area
  const calArea=document.getElementById('cal-area');
  swipeInCalArea=calArea&&calArea.contains(e.target);
  track.classList.remove('animating');
},{passive:true});

sw.addEventListener('touchmove',function(e){
  const cx=e.touches[0].clientX,cy=e.touches[0].clientY;
  dx=cx-sx;
  const dy=cy-sy;
  if(!moving){
    if(Math.abs(dy)>Math.abs(dx))return; // vertical scroll
    moving=true;
  }
  if(moving){
    // If swiping in cal-area on calendar tab, don't move panels (month nav handles it)
    if(cur===0&&swipeInCalArea)return;
    // Prevent Chrome back/forward gesture when in detail view
    if((cur===3&&noteView==='detail')||(cur===4&&listView==='detail')||(cur===1&&memoCardView==='detail')){
      e.preventDefault();
      // Don't move panel but still track dx for touchend swipe detection
      return;
    }
    const base=-cur*getVw();
    // Resistance at edges
    let offset=dx;
    if((cur===0&&dx>0)||(cur===4&&dx<0))offset=dx*0.3;
    setPos(base+offset,false);
  }
},{passive:false});

sw.addEventListener('touchend',function(e){
  if(!moving){return}
  moving=false;
  // If swipe was in cal-area, don't switch tabs (month nav handles it)
  if(cur===0&&swipeInCalArea){snapTo(cur);return}
  const elapsed=Date.now()-startT;
  const velocity=Math.abs(dx)/elapsed;
  const threshold=getVw()*0.25;
  const isSwipeRight=dx>threshold||(dx>30&&velocity>0.3);
  const isSwipeLeft=dx<-threshold||(dx<-30&&velocity>0.3);

  // If in detail view on Notes or Lists, swipe right goes back
  if(isSwipeRight){
    if(cur===3&&noteView==='detail'){
      saveNote();noteView='list';currentNoteId=null;
      renderNotes(document.getElementById('p3'));snapTo(cur);
      return;
    }
    if(cur===4&&listView==='detail'){
      saveList();listView='list';currentListId=null;
      renderLists(document.getElementById('p4'));snapTo(cur);
      return;
    }
    if(cur===1&&memoCardView==='detail'){
      memoCardView='list';memoCardId=null;
      renderMemo(document.getElementById('p1'));snapTo(cur);
      return;
    }
    // Normal swipe back to previous tab (only if NOT in detail view)
    if((cur===3&&noteView==='detail')||(cur===4&&listView==='detail')||(cur===1&&memoCardView==='detail')){snapTo(cur)}
    else if(cur>0){const target=cur-1;prevTab=cur;snapTo(target)}else{snapTo(cur)}
  }else if(isSwipeLeft){
    if(cur<4){prevTab=cur;snapTo(cur+1)}else{snapTo(cur)}
  }else{
    snapTo(cur);
  }
},{passive:true});

// After animation ends
track.addEventListener('transitionend',function(){track.classList.remove('animating')});

// --- Render ---
function render(panels){
  if(!panels||panels==='all'){
    renderCalendar(document.getElementById('p0'));
    renderMemo(document.getElementById('p1'));
    renderTasks(document.getElementById('p2'));
    renderNotes(document.getElementById('p3'));
    renderLists(document.getElementById('p4'));
  }else{
    if(panels.includes('cal'))renderCalendar(document.getElementById('p0'));
    if(panels.includes('memo'))renderMemo(document.getElementById('p1'));
    if(panels.includes('tasks'))renderTasks(document.getElementById('p2'));
    if(panels.includes('notes'))renderNotes(document.getElementById('p3'));
    if(panels.includes('lists'))renderLists(document.getElementById('p4'));
  }
  setTimeout(initTodayDrag,0);
  setTimeout(initDetailSwipe,0);
}

  const todayLists=lists.filter(l=>l.status!=='completed'&&l.dueDate&&l.dueDate<=todayStr()&&!dismissedIds.includes(l.id));
  // Build allTodayItems respecting todayIds order for ALL item types
  const allTodayItems=[];
  const addedIds=new Set();

  const todayRecurring=recurring.filter(r=>{const nd=getNextRecurringDate(r);return nd===todayStr()&&!dismissedIds.includes(r.id)});
  // First: items explicitly in todayIds (in saved order)
  todayIds.forEach(id=>{
    const t=active.find(x=>x.id===id);
    if(t){allTodayItems.push({...t,_type:'task'});addedIds.add(id);return}
    const n=notes.find(x=>x.id===id&&x.status!=='completed');
    if(n&&!dismissedIds.includes(id)){allTodayItems.push({...n,_type:'note'});addedIds.add(id);return}
    const l=lists.find(x=>x.id===id&&x.status!=='completed');
    if(l&&!dismissedIds.includes(id)){allTodayItems.push({...l,_type:'list'});addedIds.add(id);return}
    const r=todayRecurring.find(x=>x.id===id);
    if(r){allTodayItems.push({...r,dueDate:todayStr(),_type:'recurring',repeat:r.repeat,days:r.days});addedIds.add(id);return}
  });
  // Then: auto-added notes/lists (due today/overdue) not yet in todayIds

  const tomorrowMs=todayStartMs+24*60*60*1000;

  const todayCompletedTasks=tasks.filter(t=>t.status==='completed'&&isCompletedToday(t)).length;
  const todayCompletedNotes=notes.filter(n=>n.status==='completed'&&isCompletedToday(n)).length;
  const todayCompletedLists=lists.filter(l=>l.status==='completed'&&isCompletedToday(l)).length;
  const todayCompletedCount=todayCompletedTasks+todayCompletedNotes+todayCompletedLists;
  const todayTotalCount=allTodayItems.length+todayCompletedCount;

  // Theme-aware progress bar color

  const progressFill=thm.includes('light')?'linear-gradient(to right,#2563eb,#3b82f6)':thm.includes('ivory-warm')?'linear-gradient(to right,#b8860b,#d4a017)':thm.includes('ivory-cool')?'linear-gradient(to right,#00897b,#26a69a)':thm.includes('ivory-pink')?'linear-gradient(to right,#d63384,#e05694)':thm.includes('ivory-blue')?'linear-gradient(to right,#1976d2,#42a5f5)':'linear-gradient(to right,#3b82f6,#60a5fa)';
  html+=`<div style="border:2px solid rgba(255,255,255,0.7);border-radius:14px;padding:12px;margin-top:4px"><div class="section-title"><span class="badge"><svg viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg></span>Today's Focus <span class="count">${allTodayItems.length}</span></div><div style="background:${progressBg};border-radius:4px;height:6px;margin-bottom:8px;overflow:hidden"><div style="height:100%;width:${progressPct}%;background:${progressFill};border-radius:4px;transition:width 0.3s"></div></div><div style="font-size:10px;color:#6b7280;margin-bottom:8px;text-align:right">${todayCompletedCount}/${todayTotalCount} completed (${progressPct}%)</div><div id="today-list" style="display:flex;flex-direction:column;gap:8px">`;

  else{html+=`<div style="display:flex;flex-direction:column;gap:8px">`;
    completed.forEach(t=>{const lbl=t.source==='schedule'?'<span style="font-size:10px;color:#a78bfa;font-weight:700;margin-right:4px">SKDL</span>':'<span style="font-size:10px;color:#60a5fa;font-weight:700;margin-right:4px">TASK</span>';html+=completedCard(t.title,lbl,"uncompleteTask('"+t.id+"')","confirmDelete('task','"+t.id+"')","editTask('"+t.id+"')")});
    completedNs.forEach(n=>{html+=completedCard(n.title||'Untitled','<span style="font-size:10px;color:#4ade80;font-weight:700;margin-right:4px">NOTE</span>',"uncompleteNote('"+n.id+"')","confirmDelete('note','"+n.id+"')","openNote('"+n.id+"')")});
    completedLs.forEach(l=>{html+=completedCard(l.title||'Untitled','<span style="font-size:10px;color:#fbbf24;font-weight:700;margin-right:4px">LIST</span>',"uncompleteList('"+l.id+"')","confirmDelete('list','"+l.id+"')","openList('"+l.id+"')")});
    html+=`</div>`}
  html+=`</div>`;
  el.innerHTML=html;
  setTimeout(updatePomoDisplay,0);
}
function taskCard(t){
  const isT=todayIds.includes(t.id);
  const overdue=t.dueDate&&t.dueDate<todayStr();
  const titleColor=overdue?'#f87171':(t.color&&t.color!=='#1f2937')?t.color:(isLight()?'#1e293b':'#9ca3af');
  const tl=t.source==='schedule'?typeLabel('skdl'):typeLabel('task');

}
function renderCalendar(el){
  const now=new Date();
  let calYear=now.getFullYear(),calMonth=now.getMonth();
  // Check if we have stored cal state
  if(window._calYear!==undefined){calYear=window._calYear;calMonth=window._calMonth;}
  else{window._calYear=calYear;window._calMonth=calMonth;}

  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=todayStr();

  // Tasks with due dates this month
  const activeTasks=tasks.filter(t=>t.status==='active'&&t.dueDate);
  const completedSchedTasks=tasks.filter(t=>t.status==='completed'&&t.dueDate);

  html+=`<div id="cal-area">`;

  // Day names row
  html+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:8px">`;
  dayNames.forEach((d,i)=>{
    const isLt=isLight();
    const color=i===0?'#ef4444':i===6?'#3b82f6':(isLight()?'#475569':'#9ca3af');
    html+=`<span style="font-size:11px;font-weight:600;color:${color}">${d}</span>`;
  });
  html+=`</div>`;

  // Calendar grid
  html+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">`;
  // Empty cells before first day
  for(let i=0;i<firstDay;i++)html+=`<div></div>`;
  // Pre-build date lookup sets for O(1) per-day checks
  const noteDates=new Set();notes.forEach(n=>{if(n.status!=='completed'&&n.dueDate)noteDates.add(n.dueDate)});
  const listDates=new Set();lists.forEach(l=>{if(l.status!=='completed'&&l.dueDate)listDates.add(l.dueDate)});
  const taskDates={};const schedDates={};
  activeTasks.forEach(t=>{if(t.source==='schedule')schedDates[t.dueDate]=true;else taskDates[t.dueDate]=true;});
  completedSchedTasks.forEach(t=>{if(t.source==='schedule')schedDates[t.dueDate]=true;else taskDates[t.dueDate]=true;});
  // Days
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dayOfWeek=(firstDay+d-1)%7;
    const isToday=dateStr===today;
    const isSelected=dateStr===selDay;
    const isLt=isLight();
    const color=dayOfWeek===0?'#ef4444':dayOfWeek===6?'#3b82f6':(isLight()?'#1e293b':'#e5e7eb');
    let bg='';
    if(isSelected)bg=isLight()?'border:2px solid #2563eb;border-radius:8px;background:rgba(37,99,235,0.08);':'border:2px solid #60a5fa;border-radius:8px;background:rgba(96,165,250,0.15);';
    else if(isToday)bg=isLight()?'background:rgba(37,99,235,0.12);border-radius:8px;':'background:rgba(96,165,250,0.2);border-radius:8px;';
    let dots='';
    const dotStyle='width:4px;height:4px;border-radius:50%;';
    if(taskDates[dateStr])dots+=`<span style="${dotStyle}background:#60a5fa"></span>`;
    if(schedDates[dateStr])dots+=`<span style="${dotStyle}background:#a78bfa"></span>`;
    if(noteDates.has(dateStr))dots+=`<span style="${dotStyle}background:#4ade80"></span>`;
    if(listDates.has(dateStr))dots+=`<span style="${dotStyle}background:#fbbf24"></span>`;
    if(!schedDates[dateStr]&&recurring.some(r=>isRecurringOnDate(r,dateStr)))dots+=`<span style="${dotStyle}background:#a78bfa"></span>`;
    const dotHtml=dots?`<div style="display:flex;gap:2px;justify-content:center;margin-top:2px">${dots}</div>`:'';
    html+=`<div onclick="calShowDay('${dateStr}')" style="text-align:center;padding:6px 2px;cursor:pointer;min-height:40px;${bg}"><span style="font-size:14px;font-weight:${isToday||isSelected?'700':'500'};color:${color}">${d}</span>${dotHtml}</div>`;
  }
  html+=`</div>`;
  html+=`</div>`; // close cal-area

  // Show items for selected day
  const dayTasks=activeTasks.filter(t=>t.dueDate===selDay);
  const completedDayTasks=tasks.filter(t=>t.status==='completed'&&t.dueDate===selDay);
  const dayNotes=notes.filter(n=>n.status!=='completed'&&n.dueDate===selDay);
  const dayLists=lists.filter(l=>l.status!=='completed'&&l.dueDate===selDay);
  const completedDayNotes=notes.filter(n=>n.status==='completed'&&n.dueDate===selDay);
  const completedDayLists=lists.filter(l=>l.status==='completed'&&l.dueDate===selDay);
  const dayRecurring=getRecurringOnDate(selDay);
  const activeDay=dayTasks.length+dayNotes.length+dayLists.length+dayRecurring.length;

  {
    html+=`<div style="margin-top:16px"><div class="section-title"><span class="badge"><svg viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></span>${selDay} <span class="count">${activeDay}</span></div><div style="display:flex;flex-direction:column;gap:6px">`;
    if(activeDay===0){html+=`<div class="empty" style="padding:12px 0;font-size:13px">No items on this day</div>`}

    });
    dayLists.forEach(l=>{
      const lBell=bellIcon(l);
      const lTime=l.dueTime?'<span class="time-label">'+l.dueTime+'</span>':'';
      const lColor=(l.color&&l.color!=='#1f2937')?l.color:(isLight()?'#1e293b':'#f1f5f9');
      html+=`<div class="cal-card">${completeBtnSm("event.stopPropagation();completeList('"+l.id+"')")}<div class="cal-info" onclick="goTo(4);setTimeout(()=>openList('${l.id}'),100)"><div class="cal-title" style="color:${lColor}">${esc(l.title||'Untitled')}</div><div class="cal-due">${lBell}${typeLabel('list')}${lTime}Due: ${l.dueDate}</div></div>${deleteBtnSm("confirmDelete('list','"+l.id+"')")}</div>`;
    });
    html+=`</div></div>`;
    // Completed section for calendar
    const calCompletedCount=completedDayTasks.length+completedDayNotes.length+completedDayLists.length;
    {
      html+=`<div style="margin-top:12px"><div class="section-title"><span class="badge"><svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></span>Completed <span class="count">${calCompletedCount}</span></div><div style="display:flex;flex-direction:column;gap:6px">`;
      if(calCompletedCount===0){html+=`<div class="empty" style="padding:12px 0;font-size:13px">No completed items</div>`}
      completedDayTasks.forEach(t=>{
        const lbl=t.source==='schedule'?'<span style="font-size:10px;color:#a78bfa;font-weight:700;margin-right:4px">SKDL</span>':'<span style="font-size:10px;color:#60a5fa;font-weight:700;margin-right:4px">TASK</span>';
        html+=completedCard(t.title,lbl,"uncompleteTask('"+t.id+"')","confirmDelete('task','"+t.id+"')","editTask('"+t.id+"')");
      });
      completedDayNotes.forEach(n=>{
        html+=completedCard(n.title||'Untitled','<span style="font-size:10px;color:#4ade80;font-weight:700;margin-right:4px">NOTE</span>',"uncompleteNote('"+n.id+"')","confirmDelete('note','"+n.id+"')","openNote('"+n.id+"')");

      completedDayLists.forEach(l=>{

      });
      html+=`</div></div>`;
    }
  }

  el.innerHTML=html;
  setTimeout(initCalSwipe,0);
}

function calPrev(){window._calMonth--;if(window._calMonth<0){window._calMonth=11;window._calYear--;}renderCalendar(document.getElementById('p0'))}
function calNext(){window._calMonth++;if(window._calMonth>11){window._calMonth=0;window._calYear++;}renderCalendar(document.getElementById('p0'))}
function calShowDay(dateStr){
  const now=Date.now();
  if(window._calLastTapDay===dateStr&&now-window._calLastTapTime<3000){
    // Double tap within 3 seconds - open add schedule
    window._calSelectedDay=dateStr;
    renderCalendar(document.getElementById('p0'));
    addSchedule();
    window._calLastTapDay=null;
    return;
  }
  window._calLastTapDay=dateStr;
  window._calLastTapTime=now;
  window._calSelectedDay=dateStr;
  renderCalendar(document.getElementById('p0'));
}

function isRecurringOnDate(rec,dateStr){
  if(dateStr<rec.startDate)return false;
  if(dateStr===rec.startDate)return true;
  const start=new Date(rec.startDate+'T00:00:00');
  const target=new Date(dateStr+'T00:00:00');
  const diffMs=target-start;
  const diffDays=Math.round(diffMs/(1000*60*60*24));
  if(rec.repeat==='weekly')return diffDays%7===0;
  if(rec.repeat==='biweekly')return diffDays%14===0;
  if(rec.repeat==='custom')return diffDays%(rec.days||1)===0;
  if(rec.repeat==='monthly'){return start.getDate()===target.getDate()}
  if(rec.repeat==='yearly'){return start.getMonth()===target.getMonth()&&start.getDate()===target.getDate()}
  return false;
}
function getRecurringOnDate(dateStr){return recurring.filter(r=>isRecurringOnDate(r,dateStr))}
function deleteRecurring(id,dateStr){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.7);display:flex;align-items:flex-start;justify-content:center;padding:16px;padding-top:60px';
  overlay.innerHTML=`<div style="background:#1f2937;border:1px solid #374151;border-radius:12px;padding:20px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px">
    <div style="font-size:14px;font-weight:600;color:#f1f5f9">Delete Schedule</div>
    <div style="font-size:13px;color:#9ca3af">How do you want to delete this recurring schedule?</div>
    <button id="del-rec-one" style="min-height:44px;border:1px solid #374151;border-radius:8px;background:none;color:#f3f4f6;font-size:14px;cursor:pointer;padding:0 16px;text-align:left">Delete this day only</button>
    <button id="del-rec-all" style="min-height:44px;border:1px solid #f87171;border-radius:8px;background:rgba(248,113,113,0.1);color:#f87171;font-size:14px;font-weight:600;cursor:pointer;padding:0 16px;text-align:left">Delete all recurrences</button>
    <button id="del-rec-cancel" style="min-height:40px;border:1px solid #374151;border-radius:8px;background:none;color:#6b7280;font-size:14px;cursor:pointer;padding:0 16px">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',function(e){if(e.target===overlay){document.body.removeChild(overlay)}});
  document.getElementById('del-rec-cancel').addEventListener('click',function(){document.body.removeChild(overlay)});
  document.getElementById('del-rec-one').addEventListener('click',function(){
    // Add this date to completedDates (effectively skip it)
    const rec=recurring.find(r=>r.id===id);
    if(rec){
      if(!rec.completedDates)rec.completedDates=[];
      const targetDate=dateStr||getNextRecurringDate(rec);
      rec.completedDates.push(targetDate);
      recurring=recurring.map(r=>r.id===id?rec:r);
      saveRecurring(recurring);
    }
    document.body.removeChild(overlay);
    render(['tasks','cal']);
  });
  document.getElementById('del-rec-all').addEventListener('click',function(){
    recurring=recurring.filter(r=>r.id!==id);
    saveRecurring(recurring);
    todayIds=todayIds.filter(i=>i!==id);
    saveToday(todayIds);
    document.body.removeChild(overlay);
    render(['tasks','cal']);
  });
}

function getNextRecurringDate(rec){
  const today=todayStr();
  const completed=rec.completedDates||[];
  const start=new Date(rec.startDate+'T00:00:00');
  const now=new Date(today+'T00:00:00');
  // Find next occurrence >= today that's not completed
  let candidate;
  if(rec.repeat==='weekly'||rec.repeat==='biweekly'||rec.repeat==='custom'){
    const interval=rec.repeat==='weekly'?7:rec.repeat==='biweekly'?14:(rec.days||1);
    let diff=Math.floor((now-start)/(interval*86400000));
    if(diff<0)diff=0;
    for(let i=diff;i<diff+60;i++){
      const d=new Date(start.getTime()+i*interval*86400000);
      const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(ds>=today&&!completed.includes(ds))return ds;
    }
  }else if(rec.repeat==='monthly'){
    const day=start.getDate();
    let y=now.getFullYear(),m=now.getMonth();
    for(let i=0;i<24;i++){
      candidate=new Date(y,m+i,day);
      const ds=candidate.getFullYear()+'-'+String(candidate.getMonth()+1).padStart(2,'0')+'-'+String(candidate.getDate()).padStart(2,'0');
      if(ds>=today&&!completed.includes(ds))return ds;
    }
  }else if(rec.repeat==='yearly'){
    let y=now.getFullYear();
    for(let i=0;i<10;i++){
      candidate=new Date(y+i,start.getMonth(),start.getDate());
      const ds=candidate.getFullYear()+'-'+String(candidate.getMonth()+1).padStart(2,'0')+'-'+String(candidate.getDate()).padStart(2,'0');
      if(ds>=today&&!completed.includes(ds))return ds;
    }
  }
  return today;
}

function completeRecurring(id){
  const rec=recurring.find(r=>r.id===id);
  if(!rec)return;
  const nextDate=getNextRecurringDate(rec);
  if(!rec.completedDates)rec.completedDates=[];
  rec.completedDates.push(nextDate);
  // Keep only last 90 completed dates to support streak tracking
  if(rec.completedDates.length>90)rec.completedDates=rec.completedDates.slice(-90);
  recurring=recurring.map(r=>r.id===id?rec:r);
  saveRecurring(recurring);
  // Remove from todayIds so next occurrence can appear fresh
  todayIds=todayIds.filter(i=>i!==id);
  saveToday(todayIds);
  // Add to completed tasks list for display
  const task={id:uid(),title:rec.title,dueDate:nextDate,status:'completed',source:'schedule',createdAt:rec.createdAt,completedAt:new Date().toISOString()};

// Calendar swipe for month navigation
let calSx=0,calMoving=false,calDx=0;
function initCalSwipe(){
  const calEl=document.getElementById('cal-area');
  if(!calEl)return;
  calEl.style.transition='none';
  calEl.addEventListener('touchstart',function(e){calSx=e.touches[0].clientX;calMoving=false;calDx=0;calEl.style.transition='none';calEl.style.transform='translateX(0)';calEl.style.opacity='1'},{passive:true});
  calEl.addEventListener('touchmove',function(e){
    calDx=e.touches[0].clientX-calSx;
    if(Math.abs(calDx)>15)calMoving=true;
    if(calMoving){
      const offset=calDx*0.4;
      const opacity=1-Math.abs(calDx)/400;
      calEl.style.transform='translateX('+offset+'px)';
      calEl.style.opacity=Math.max(opacity,0.3);
    }
  },{passive:true});
  calEl.addEventListener('touchend',function(e){
    if(!calMoving){calEl.style.transform='';calEl.style.opacity='';return}
    const cdx=e.changedTouches[0].clientX-calSx;
    if(Math.abs(cdx)>50){
      const dir=cdx>0?1:-1;
      calEl.style.transition='transform 0.2s ease-out, opacity 0.2s ease-out';
      calEl.style.transform='translateX('+(dir*120)+'px)';
      calEl.style.opacity='0';
      setTimeout(()=>{
        if(cdx>50)calPrev();else calNext();
        // After re-render, animate in from opposite side
        setTimeout(()=>{
          const newEl=document.getElementById('cal-area');
          if(newEl){
            newEl.style.transition='none';
            newEl.style.transform='translateX('+(-dir*80)+'px)';
            newEl.style.opacity='0';
            setTimeout(()=>{
              newEl.style.transition='transform 0.25s ease-out, opacity 0.25s ease-out';
              newEl.style.transform='translateX(0)';
              newEl.style.opacity='1';
            },20);
          }
        },20);
      },200);
    }else{
      calEl.style.transition='transform 0.2s ease-out, opacity 0.2s ease-out';
      calEl.style.transform='translateX(0)';
      calEl.style.opacity='1';
    }
    calMoving=false;
  },{passive:true});
}

// Drag reorder for cards
let cardDragEl=null,cardDragStartY=0,cardIsDragging=false,cardLongPressTimer=null;
function initCardDrag(){
  const list=document.getElementById('card-list');
  if(!list)return;
  list.querySelectorAll('.note-card').forEach(item=>{
    item.addEventListener('touchstart',onCardDragStart,{passive:false});
  });
}
function onCardDragStart(e){
  const item=e.currentTarget;
  const id=item.getAttribute('data-id');
  if(isPinned(id))return;
  cardDragStartY=e.touches[0].clientY;
  cardLongPressTimer=setTimeout(()=>{
    cardIsDragging=true;cardDragEl=item;
    item.style.opacity='0.7';item.style.zIndex='1000';item.style.boxShadow='0 4px 20px rgba(0,0,0,0.5)';item.style.transition='none';
    document.addEventListener('touchmove',onCardDragMove,{passive:false});
    document.addEventListener('touchend',onCardDragEnd,{passive:false});
  },400);
  const cancelCheck=(ev)=>{if(Math.abs(ev.touches[0].clientY-cardDragStartY)>10){clearTimeout(cardLongPressTimer);document.removeEventListener('touchmove',cancelCheck)}};
  document.addEventListener('touchmove',cancelCheck,{passive:true});
  item.addEventListener('touchend',()=>{clearTimeout(cardLongPressTimer);document.removeEventListener('touchmove',cancelCheck)},{once:true});
}
function onCardDragMove(e){
  if(!cardIsDragging||!cardDragEl)return;
  e.preventDefault();
  const y=e.touches[0].clientY;
  const dy=y-cardDragStartY;
  cardDragEl.style.transform='translateY('+dy+'px)';
  const list=document.getElementById('card-list');
  const items=[...list.querySelectorAll('.note-card')];
  const dragIdx=items.indexOf(cardDragEl);
  const dragRect=cardDragEl.getBoundingClientRect();
  const dragCenter=dragRect.top+dragRect.height/2;
  for(let i=0;i<items.length;i++){
    if(i===dragIdx)continue;
    const rect=items[i].getBoundingClientRect();
    const center=rect.top+rect.height/2;
    if(dragIdx<i&&dragCenter>center){list.insertBefore(cardDragEl,items[i].nextSibling);cardDragStartY=y;cardDragEl.style.transform='translateY(0)';break}
    else if(dragIdx>i&&dragCenter<center){list.insertBefore(cardDragEl,items[i]);cardDragStartY=y;cardDragEl.style.transform='translateY(0)';break}
  }
}
function onCardDragEnd(){
  if(!cardIsDragging)return;
  cardIsDragging=false;
  document.removeEventListener('touchmove',onCardDragMove);
  document.removeEventListener('touchend',onCardDragEnd);
  if(cardDragEl){cardDragEl.style.opacity='';cardDragEl.style.zIndex='';cardDragEl.style.boxShadow='';cardDragEl.style.transform='';cardDragEl.style.transition=''}
  const list=document.getElementById('card-list');
  if(list){
    const key=currentMemoTab===3?'tm-people':'tm-places';
    const newIds=[...list.querySelectorAll('.note-card')].map(el=>el.getAttribute('data-id'));
    let items=loadCardItems(key);
    newIds.forEach((id,i)=>{items=items.map(c=>c.id===id?{...c,order:i}:c)});
    saveCardItems(key,items);
  }
  cardDragEl=null;
}

function addTask(){showAddTaskModal()}
function completeTask(id){
  // Animate the item out
  const items=document.querySelectorAll('[data-id="'+id+'"],.task');
  let targetEl=null;
  items.forEach(el=>{
    if(el.querySelector('[onclick*="completeTask(\''+id+'\')"'))targetEl=el;
    if(el.getAttribute('data-id')===id)targetEl=el;
  });
  if(targetEl){
    const btn=targetEl.querySelector('.complete-btn')||targetEl.querySelector('button');
    if(btn)btn.classList.add('anim-check');
    animateItemOut(targetEl,function(){
      tasks=tasks.map(t=>t.id===id?{...t,status:'completed',completedAt:new Date().toISOString()}:t);saveTasks(tasks);todayIds=todayIds.filter(i=>i!==id);saveToday(todayIds);render(['tasks','cal']);
    });
  }else{
    tasks=tasks.map(t=>t.id===id?{...t,status:'completed',completedAt:new Date().toISOString()}:t);saveTasks(tasks);todayIds=todayIds.filter(i=>i!==id);saveToday(todayIds);render(['tasks','cal']);
  }
}
function uncompleteTask(id){tasks=tasks.map(t=>t.id===id?{...t,status:'active',completedAt:null}:t);saveTasks(tasks);const t=tasks.find(x=>x.id===id);if(t&&t.dueDate&&t.dueDate<=todayStr()&&!todayIds.includes(id)){todayIds.push(id);saveToday(todayIds)}render(['tasks','cal'])}
function deleteTask(id){confirmDelete('task',id)}
function toggleToday(id){if(todayIds.includes(id))todayIds=todayIds.filter(i=>i!==id);else todayIds.push(id);saveToday(todayIds);render(['tasks']);document.getElementById('p2').scrollTop=0}
function removeToday(id){todayIds=todayIds.filter(i=>i!==id);saveToday(todayIds);render(['tasks'])}
function toggleTodayNote(id){
  if(todayIds.includes(id)){todayIds=todayIds.filter(i=>i!==id)}

  saveToday(todayIds);render(['tasks']);

function toggleTodayList(id){

  saveToday(todayIds);render(['tasks']);

}

function moveNoteUp(id){
  const sorted=notes.slice().sort((a,b)=>a.order-b.order);
  const idx=sorted.findIndex(n=>n.id===id);
  if(idx<=0)return;
  const prev=sorted[idx-1];
  const curr=sorted[idx];
  const tempOrder=curr.order;
  notes=notes.map(n=>{
    if(n.id===curr.id)return{...n,order:prev.order};
    if(n.id===prev.id)return{...n,order:tempOrder};
    return n;
  });
  saveNotes(notes);
  renderNotes(document.getElementById('p3'));
}

function moveNoteDown(id){
  const sorted=notes.slice().sort((a,b)=>a.order-b.order);
  const idx=sorted.findIndex(n=>n.id===id);
  if(idx<0||idx>=sorted.length-1)return;
  const next=sorted[idx+1];
  const curr=sorted[idx];
  const tempOrder=curr.order;
  notes=notes.map(n=>{
    if(n.id===curr.id)return{...n,order:next.order};
    if(n.id===next.id)return{...n,order:tempOrder};
    return n;
  });
  saveNotes(notes);
  renderNotes(document.getElementById('p3'));
}

// --- Long-press drag reorder for Lists ---
let listDragEl=null,listDragStartY=0,listIsDragging=false,listLongPressTimer=null;

function initListDrag(){
  const list=document.getElementById('list-list');
  if(!list)return;
  const items=list.querySelectorAll('.note-card');
  items.forEach(item=>{
    item.addEventListener('touchstart',onListDragStart,{passive:false});
  });
}

function onListDragStart(e){
  const item=e.currentTarget;
  // Prevent dragging pinned items
  const id=item.getAttribute('data-id');
  if(isPinned(id)){return;}
  listDragStartY=e.touches[0].clientY;
  listLongPressTimer=setTimeout(()=>{
    listIsDragging=true;
    listDragEl=item;
    item.style.opacity='0.7';
    item.style.zIndex='1000';
    item.style.boxShadow='0 4px 20px rgba(0,0,0,0.5)';
    item.style.transition='none';
    document.addEventListener('touchmove',onListDragMove,{passive:false});
    document.addEventListener('touchend',onListDragEnd,{passive:false});
  },400);
  const cancelCheck=(ev)=>{
    if(Math.abs(ev.touches[0].clientY-listDragStartY)>10){
      clearTimeout(listLongPressTimer);
      document.removeEventListener('touchmove',cancelCheck);
    }
  };
  document.addEventListener('touchmove',cancelCheck,{passive:true});
  item.addEventListener('touchend',()=>{
    clearTimeout(listLongPressTimer);
    document.removeEventListener('touchmove',cancelCheck);
  },{once:true});
}

function onListDragMove(e){
  if(!listIsDragging||!listDragEl)return;
  e.preventDefault();
  const y=e.touches[0].clientY;
  const dy=y-listDragStartY;
  listDragEl.style.transform='translateY('+dy+'px)';
  const container=document.getElementById('list-list');
  const items=[...container.querySelectorAll('.note-card')];
  const dragIdx=items.indexOf(listDragEl);
  const dragRect=listDragEl.getBoundingClientRect();
  const dragCenter=dragRect.top+dragRect.height/2;
  for(let i=0;i<items.length;i++){
    if(i===dragIdx)continue;
    const rect=items[i].getBoundingClientRect();
    const center=rect.top+rect.height/2;
    if(dragIdx<i&&dragCenter>center){
      container.insertBefore(listDragEl,items[i].nextSibling);
      listDragStartY=y;
      listDragEl.style.transform='translateY(0)';
      break;
    }else if(dragIdx>i&&dragCenter<center){
      container.insertBefore(listDragEl,items[i]);
      listDragStartY=y;
      listDragEl.style.transform='translateY(0)';
      break;
    }
  }
}

function onListDragEnd(){
  if(!listIsDragging)return;
  listIsDragging=false;
  document.removeEventListener('touchmove',onListDragMove);
  document.removeEventListener('touchend',onListDragEnd);
  if(listDragEl){
    listDragEl.style.opacity='';
    listDragEl.style.zIndex='';
    listDragEl.style.boxShadow='';
    listDragEl.style.transform='';
    listDragEl.style.transition='';
  }
  const container=document.getElementById('list-list');
  if(container){
    const newIds=[...container.querySelectorAll('.note-card')].map(el=>el.getAttribute('data-id'));
    newIds.forEach((id,i)=>{
      lists=lists.map(l=>l.id===id?{...l,order:i}:l);
    });
    saveLists(lists);
    renderLists(document.getElementById('p4'));
  }
  listDragEl=null;
}
